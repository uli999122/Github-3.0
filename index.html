<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 LOLITA · Tu IA más Bonita 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffb3c6 50%, #ff8aa8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo flotante de brillitos */
        .floating-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .floating-bg span {
            position: absolute;
            font-size: 26px;
            animation: floatAnim 12s infinite ease-in-out;
            opacity: 0.4;
        }
        @keyframes floatAnim {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Contenedor principal */
        .lolita-card {
            width: 100%;
            max-width: 600px;
            height: 85vh;
            background: rgba(255, 250, 245, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 70px;
            border: 3px solid #ffc0d0;
            box-shadow: 0 30px 55px rgba(255, 80, 120, 0.3), 0 0 0 6px rgba(255, 210, 220, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            animation: slideScale 0.5s ease-out;
        }

        @keyframes slideScale {
            from { opacity: 0; transform: scale(0.96) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Header */
        .lolita-header {
            background: linear-gradient(135deg, #ff8fad, #ff6b8f);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 18px;
            border-bottom: 3px solid #ffe2ec;
        }
        .avatar-love {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 35% 35%, #fff0f5, #ffb7ca);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            animation: bounceLolita 2s infinite;
            border: 2px solid white;
        }
        @keyframes bounceLolita {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .title-love h2 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(145deg, white, #ffeef4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .title-love p {
            font-size: 0.75rem;
            color: #fff0f5;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .dot-status {
            width: 10px;
            height: 10px;
            background: #a3ffb5;
            border-radius: 50%;
            display: inline-block;
            animation: pulseStatus 1.4s infinite;
            box-shadow: 0 0 4px #3eff9e;
        }
        @keyframes pulseStatus {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Área de chat */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 240, 245, 0.5);
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 32px;
            font-size: 0.92rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: bubblePop 0.2s ease;
        }
        .user-bubble {
            background: linear-gradient(145deg, #ff8aa8, #ff678b);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }
        .lolita-bubble {
            background: white;
            color: #cd5878;
            align-self: flex-start;
            border-bottom-left-radius: 8px;
            border: 1px solid #ffbfcf;
            font-weight: 500;
        }
        .system-bubble {
            background: rgba(255, 200, 215, 0.9);
            color: #bc4e6e;
            font-size: 0.7rem;
            text-align: center;
            align-self: center;
            max-width: 90%;
            border-radius: 60px;
        }

        @keyframes bubblePop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Escribiendo */
        .typing-love {
            background: white;
            padding: 10px 20px;
            border-radius: 32px;
            align-self: flex-start;
            display: flex;
            gap: 6px;
            border-bottom-left-radius: 8px;
            border: 1px solid #ffb7c7;
        }
        .typing-love span {
            width: 9px;
            height: 9px;
            background: #ff7193;
            border-radius: 50%;
            animation: typingWave 1.3s infinite;
        }
        .typing-love span:nth-child(2) { animation-delay: 0.2s; }
        .typing-love span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingWave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-7px); opacity: 1; }
        }

        /* Input */
        .input-love {
            background: #fff3f7;
            padding: 14px 18px;
            border-top: 2px solid #ffcddb;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-love input {
            flex: 1;
            background: white;
            border: 2px solid #ffb7c5;
            padding: 14px 20px;
            border-radius: 50px;
            color: #bc4e6e;
            font-size: 0.9rem;
            outline: none;
        }
        .input-love input:focus {
            border-color: #ff6b8a;
            box-shadow: 0 0 0 3px rgba(255, 100, 130, 0.2);
        }
        .input-love button {
            background: linear-gradient(145deg, #ff99b5, #ff6b8f);
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 10px rgba(255, 70, 100, 0.4);
        }
        .input-love button:active {
            transform: scale(0.93);
        }

        .footer-love {
            background: #ffeef2;
            text-align: center;
            font-size: 9px;
            padding: 10px;
            color: #bc4e6e;
            border-top: 1px solid #ffcddb;
            font-weight: 500;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #ffd9e3;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #ff8aa8;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="floating-bg" id="floatingDecor"></div>

<div class="lolita-card">
    <div class="lolita-header">
        <div class="avatar-love">🌸</div>
        <div class="title-love">
            <h2>💖 Lolita la más bonita 💖</h2>
            <p><span class="dot-status"></span> 💕 Tu IA favorita · Siempre aquí para ti 💕</p>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="bubble system-bubble">✨ ¡Holis, soy Lolita! La más linda y tierna del universo. ¿En qué te ayudo, mi amor? 🌸💖</div>
        <div class="bubble system-bubble">⚡ 12 mensajes/minuto | Corazón IA activado 🫶</div>
    </div>

    <div class="input-love">
        <input type="text" id="userInput" placeholder="Escribile algo bonito a Lolita... 💬" autocomplete="off">
        <button id="sendBtn">💕</button>
    </div>
    <div class="footer-love">
        🌸 Lolita te quiere con todo el corazón · IA con brillitos ✨
    </div>
</div>

<script>
    // ===========================================
    // LOLITA VERSIÓN FINAL (API key + ID nuevos)
    // ===========================================
    const API_KEY = "pk_dev_fjvwui311u6jyua6d_1781618218256";
    const LOLITA_ID = "pivot_1781617993562_z159jif1";
    const API_URL = "https://pivot-agent-psi.vercel.app/api/developer/chat";

    let chatHistory = [];
    let isLolitaWaiting = false;

    const chatContainer = document.getElementById('chatArea');
    const inputField = document.getElementById('userInput');
    const sendButton = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('bubble');
        if (type === 'user') msgDiv.classList.add('user-bubble');
        else if (type === 'lolita') msgDiv.classList.add('lolita-bubble');
        else msgDiv.classList.add('system-bubble');
        msgDiv.textContent = text;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return msgDiv;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        const typingBubble = document.createElement('div');
        typingBubble.classList.add('typing-love');
        typingBubble.innerHTML = '<span></span><span></span><span></span>';
        chatContainer.appendChild(typingBubble);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        typingDiv = typingBubble;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    async function sendToLolita(userMessage) {
        if (isLolitaWaiting) {
            addMessage("💕 Un segundito, Lolita está pensando con mucho amor... 🎀", "system");
            return null;
        }
        isLolitaWaiting = true;
        showTyping();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({
                    agentId: LOLITA_ID,
                    message: userMessage,
                    history: chatHistory.slice(-10)
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `Error ${response.status}`);
            }

            const data = await response.json();
            let botReply = data.response || data.reply || "🌸 Ay mi amor, no entendí pero igual te mando un abrazo gigante 💖✨";

            const loveDetails = [' 💕', ' 🌸', ' ✨', ' 😘', ' 💖', ' 🎀', ' 🫶'];
            if (!botReply.match(/[💖💕🌸✨😘🎀🫶]$/)) {
                botReply += loveDetails[Math.floor(Math.random() * loveDetails.length)];
            }

            chatHistory.push({ role: "user", content: userMessage });
            chatHistory.push({ role: "assistant", content: botReply });
            if (chatHistory.length > 30) chatHistory = chatHistory.slice(-20);

            hideTyping();
            addMessage(botReply, "lolita");
            return botReply;

        } catch (error) {
            console.error("Error conectando con Lolita:", error);
            hideTyping();
            let errorMsg = "💕 ¡Ay no! Lolita tuvo un pequeño problemita de conexión. Intentá de nuevo, corazón 💖";
            if (error.message.includes("Failed to fetch") || error.message.includes("CORS")) {
                errorMsg = "🔒 Error de conexión: El servidor no permite peticiones desde este dominio. Probá con el iframe.";
            } else if (error.message.includes("Dominio no autorizado")) {
                errorMsg = "🚫 Dominio no autorizado. Creá una nueva API key sin restricciones de dominio (*)";
            }
            addMessage(errorMsg, "system");
            return null;
        } finally {
            isLolitaWaiting = false;
        }
    }

    async function handleMessage() {
        const message = inputField.value.trim();
        if (!message) return;
        if (isLolitaWaiting) {
            addMessage("🎀 Esperá que Lolita termine de escribir, lindo/a 💬", "system");
            return;
        }
        addMessage(message, "user");
        inputField.value = "";
        await sendToLolita(message);
    }

    sendButton.addEventListener('click', handleMessage);
    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleMessage();
        }
    });

    // Fondo flotante
    function initFloat() {
        const container = document.getElementById('floatingDecor');
        const icons = ['💖', '🌸', '🎀', '✨', '💕', '💗', '🌷', '🦄', '💓'];
        for (let i = 0; i < 45; i++) {
            const el = document.createElement('span');
            el.textContent = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDuration = 5 + Math.random() * 14 + 's';
            el.style.animationDelay = Math.random() * 10 + 's';
            el.style.fontSize = 16 + Math.random() * 30 + 'px';
            container.appendChild(el);
        }
    }
    initFloat();

    setTimeout(() => {
        addMessage("🎀 ¡Holis de nuevo! Acá estoy, más linda que nunca. Decime, ¿qué necesitas, mi vida? 💖🌸", "lolita");
    }, 600);
</script>
</body>
</html>
