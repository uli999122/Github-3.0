<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Pivot Cloud • Enterprise Backend</title>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet para mapas -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #0f0f0f;
            --surface-elevated: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #06b6d4;
            --accent-dark: #0891b2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gradient: linear-gradient(135deg, #06b6d4, #0891b2);
            --gradient-danger: linear-gradient(135deg, #ef4444, #dc2626);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        [data-theme="light"] {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --surface-elevated: #f0f0f0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
        }

        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text-primary);
            min-height: 100vh;
            transition: all 0.3s;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); } 50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.4); } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Layout */
        .app-container { min-height: 100vh; background: var(--bg); }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(var(--bg-rgb, 10, 10, 10), 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 44px; height: 44px; background: var(--gradient); border-radius: 14px; display: flex; align-items: center; justify-content: center; animation: glow 3s infinite; }
        .logo-text { font-size: 20px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: rgba(6, 182, 212, 0.15); color: var(--accent); }
        .ip-display { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: rgba(16, 185, 129, 0.12); color: var(--success); display: flex; align-items: center; gap: 6px; }
        
        /* Sidebar */
        .layout { display: flex; min-height: calc(100vh - 77px); }
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            padding: 20px 0;
            position: sticky;
            top: 77px;
            height: calc(100vh - 77px);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .nav-item:hover { background: rgba(6, 182, 212, 0.05); }
        .nav-item.active { background: rgba(6, 182, 212, 0.1); color: var(--accent); border-right: 3px solid var(--accent); }
        .nav-icon { width: 20px; height: 20px; }

        .main-content { flex: 1; padding: 24px; overflow-y: auto; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: rgba(6, 182, 212, 0.3); }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .stat-change { font-size: 11px; margin-top: 8px; color: var(--success); }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: fadeIn 0.4s ease;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .card-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

        /* Charts */
        .chart-container { height: 300px; position: relative; }
        .map-container { height: 400px; border-radius: var(--radius-lg); overflow: hidden; }

        /* Tables */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .data-table th { color: var(--text-secondary); font-weight: 600; font-size: 12px; }

        /* Badges */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .badge-online { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-offline { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }

        /* API Playground */
        .api-playground {
            background: var(--surface-elevated);
            border-radius: var(--radius-lg);
            padding: 20px;
        }
        .api-url { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .api-url select, .api-url input {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            color: var(--text-primary);
        }
        .api-url select { width: 100px; }
        .api-url input { flex: 1; min-width: 200px; }
        .api-body {
            width: 100%;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: 12px;
            font-family: monospace;
            margin-bottom: 16px;
        }
        .api-response {
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--radius-md);
            padding: 16px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Webhook Item */
        .webhook-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
        }
        .webhook-url { font-family: monospace; font-size: 12px; }

        /* Alert Item */
        .alert-item {
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .alert-item.critical { background: rgba(239, 68, 68, 0.1); border-left: 3px solid var(--danger); }
        .alert-item.warning { background: rgba(245, 158, 11, 0.1); border-left: 3px solid var(--warning); }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(6, 182, 212, 0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }

        /* Theme Toggle */
        .theme-toggle {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 2000;
            display: none;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; z-index: 200; transition: all 0.3s; }
            .sidebar.open { left: 0; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo">
            <div class="logo-icon">☁️</div>
            <span class="logo-text">PIVOT CLOUD</span>
            <span class="logo-badge">ENTERPRISE</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div class="ip-display" id="ipDisplay">
                <span>🌐</span>
                <span id="userIp">Detectando IP...</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <nav>
                <div class="nav-item active" data-page="dashboard"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard Ejecutivo</span></div>
                <div class="nav-item" data-page="monitoring"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12h3l2-3 2 3 2-3 2 3 2-3 3 3"/><line x1="2" y1="20" x2="22" y2="20"/></svg><span>Monitoreo Avanzado</span></div>
                <div class="nav-item" data-page="apps"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg><span>Apps del Ecosistema</span></div>
                <div class="nav-item" data-page="logs"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12v8H4v-8M12 2v12m-4-4l4 4 4-4"/></svg><span>Logs y Auditoría</span></div>
                <div class="nav-item" data-page="alerts"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg><span>Alertas IA</span></div>
                <div class="nav-item" data-page="analytics"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9h-4m-5 9a9 9 0 0 1-9-9m9 9v-4M3 12a9 9 0 0 1 9-9m-9 9h4m5-9a9 9 0 0 1 9 9"/></svg><span>Analytics</span></div>
                <div class="nav-item" data-page="playground"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="7,4 19,12 7,20"/></svg><span>API Playground</span></div>
                <div class="nav-item" data-page="webhooks"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 12a8 8 0 0 1 14-6.9M4 12v4m0-4h4m12 0a8 8 0 0 1-14 6.9M20 12v-4m0 4h-4"/></svg><span>Webhooks</span></div>
                <div class="nav-item" data-page="pricing"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="6" x2="12" y2="12"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg><span>Planes y Precios</span></div>
                <div class="nav-item" data-page="security"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg><span>Seguridad</span></div>
            </nav>
        </aside>

        <main class="main-content" id="mainContent">
            <!-- Dynamic content -->
        </main>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ============================================
// PIVOT CLOUD - IMPLEMENTACIÓN COMPLETA
// 57 IDEAS + DETECCIÓN DE IP
// ============================================

// ========== ESTADO GLOBAL ==========
let currentPage = 'dashboard';
let requestsChart = null;
let latencyChart = null;
let map = null;
let userIP = null;

// Datos simulados (en producción vienen de Firestore)
let apps = [
    { id: 'lax', name: 'Pivot Lax', status: 'online', type: 'social', latency: 45, requests: 234567, lastSeen: new Date() },
    { id: 'pay', name: 'Pivot Pay', status: 'online', type: 'finance', latency: 52, requests: 89342, lastSeen: new Date() },
    { id: 'manager', name: 'Pivot Manager', status: 'online', type: 'business', latency: 38, requests: 125678, lastSeen: new Date() },
    { id: 'ai', name: 'Pivot AI', status: 'online', type: 'ai', latency: 120, requests: 45678, lastSeen: new Date() },
    { id: 'backup', name: 'Pivot Backup', status: 'online', type: 'storage', latency: 67, requests: 23456, lastSeen: new Date() },
    { id: 'auth', name: 'Pivot Auth', status: 'online', type: 'security', latency: 33, requests: 56789, lastSeen: new Date() },
    { id: 'tv', name: 'Pivot TV', status: 'online', type: 'entertainment', latency: 89, requests: 345678, lastSeen: new Date() },
    { id: 'music', name: 'Pivot Music', status: 'online', type: 'entertainment', latency: 42, requests: 456789, lastSeen: new Date() }
];

let logs = [];
let alerts = [];
let webhooks = [];

// ========== DETECCIÓN DE IP DEL USUARIO ==========
async function detectUserIP() {
    try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        userIP = data.ip;
        document.getElementById('userIp').innerHTML = userIP;
        
        // Obtener geolocalización aproximada
        const geoResponse = await fetch(`https://ipapi.co/${userIP}/json/`);
        const geoData = await geoResponse.json();
        console.log('📍 Usuario desde:', geoData.city, geoData.country_name);
        
        addLog('system', 'Usuario conectado', `IP: ${userIP} - ${geoData.city}, ${geoData.country_name}`, 'info');
    } catch(e) {
        userIP = 'No detectada';
        document.getElementById('userIp').innerHTML = 'No detectada';
    }
}

// ========== FUNCIONES AUXILIARES ==========
function addLog(app, action, details, severity = 'info') {
    logs.unshift({
        id: Date.now(),
        timestamp: new Date().toISOString(),
        app, action, details, severity
    });
    if (logs.length > 500) logs.pop();
    if (currentPage === 'logs') renderLogs();
}

function addAlert(title, message, severity = 'warning') {
    alerts.unshift({
        id: Date.now(),
        title, message, severity,
        timestamp: new Date().toISOString(),
        read: false
    });
    if (currentPage === 'alerts') renderAlerts();
    showToast(`🔔 ${title}`, severity === 'critical');
}

function showToast(msg, isError = false) {
    const toast = document.getElementById('toastEl');
    toast.textContent = msg;
    toast.style.display = 'block';
    if (isError) toast.style.borderColor = '#ef4444';
    setTimeout(() => toast.style.display = 'none', 3000);
}

// ========== DASHBOARD EJECUTIVO ==========
function renderDashboard() {
    const totalRequests = apps.reduce((a, b) => a + b.requests, 0);
    const onlineApps = apps.filter(a => a.status === 'online').length;
    const avgLatency = Math.round(apps.reduce((a, b) => a + b.latency, 0) / apps.length);
    
    const container = document.getElementById('mainContent');
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">${apps.length}</div><div class="stat-label">Apps Activas</div><div class="stat-change">🟢 ${onlineApps} online</div></div>
            <div class="stat-card"><div class="stat-value">${(totalRequests / 1000).toFixed(1)}K</div><div class="stat-label">Peticiones Totales</div><div class="stat-change">📈 +12% vs ayer</div></div>
            <div class="stat-card"><div class="stat-value">${avgLatency}ms</div><div class="stat-label">Latencia Promedio</div><div class="stat-change">✅ ${avgLatency < 50 ? 'Óptimo' : 'Normal'}</div></div>
            <div class="stat-card"><div class="stat-value">99.99%</div><div class="stat-label">SLA Cumplido</div><div class="stat-change">🎯 Objetivo superado</div></div>
        </div>
        
        <div class="card"><div class="card-header"><div class="card-title">📊 Tráfico en Tiempo Real</div></div><div class="chart-container"><canvas id="trafficChart"></canvas></div></div>
        
        <div class="card"><div class="card-header"><div class="card-title">🗺️ Mapa de Calor - Tráfico Global</div></div><div class="map-container" id="worldMap"></div></div>
        
        <div class="card"><div class="card-header"><div class="card-title">📈 Latencia por App</div></div><div class="chart-container"><canvas id="latencyChart"></canvas></div></div>
        
        <div class="card"><div class="card-header"><div class="card-title">🔄 Últimas Actividades</div></div><table class="data-table"><thead><tr><th>Hora</th><th>App</th><th>Acción</th><th>Detalles</th></tr></thead><tbody>${logs.slice(0, 10).map(l => `<tr><td style="font-size:11px">${new Date(l.timestamp).toLocaleTimeString()}</td><td><strong>${l.app}</strong></td><td>${l.action}</td><td style="color:#888">${l.details || '—'}</td></tr>`).join('')}</tbody></table></div>
    `;
    
    // Gráfica de tráfico
    const ctx = document.getElementById('trafficChart')?.getContext('2d');
    if (ctx) {
        if (requestsChart) requestsChart.destroy();
        requestsChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'], datasets: [{ label: 'Requests', data: [120, 80, 450, 890, 1230, 980], borderColor: '#06b6d4', backgroundColor: 'rgba(6,182,212,0.1)', fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#888' } } } }
        });
    }
    
    // Gráfica de latencia
    const ctx2 = document.getElementById('latencyChart')?.getContext('2d');
    if (ctx2) {
        if (latencyChart) latencyChart.destroy();
        latencyChart = new Chart(ctx2, {
            type: 'bar',
            data: { labels: apps.map(a => a.name), datasets: [{ label: 'Latencia (ms)', data: apps.map(a => a.latency), backgroundColor: '#06b6d4', borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#888' } } } }
        });
    }
    
    // Mapa mundial
    setTimeout(() => {
        if (typeof L !== 'undefined' && document.getElementById('worldMap')) {
            if (map) map.remove();
            map = L.map('worldMap').setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>' }).addTo(map);
            
            // Marcadores de tráfico
            const locations = [[40.7128, -74.0060, 45], [51.5074, -0.1278, 30], [35.6895, 139.6917, 25], [-33.8688, 151.2093, 15]];
            locations.forEach(loc => L.circleMarker([loc[0], loc[1]], { radius: loc[2], color: '#06b6d4', fillColor: '#06b6d4', fillOpacity: 0.5 }).addTo(map).bindPopup(`<b>${loc[2]}K requests</b>`));
        }
    }, 100);
}

// ========== MONITOREO AVANZADO ==========
function renderMonitoring() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">99.99%</div><div class="stat-label">Uptime</div><div class="stat-change">✅ 30 días sin incidentes</div></div>
            <div class="stat-card"><div class="stat-value">${Math.round(Math.random() * 100 + 900)}ms</div><div class="stat-label">Tiempo de respuesta p95</div><div class="stat-change">📊 Monitoreado</div></div>
            <div class="stat-card"><div class="stat-value">${Math.round(Math.random() * 5 + 1)}</div><div class="stat-label">Incidentes hoy</div><div class="stat-change">⚠️ Todos resueltos</div></div>
            <div class="stat-card"><div class="stat-value">${Math.round(Math.random() * 100)}%</div><div class="stat-label">Predicción de carga</div><div class="stat-change">🤖 IA activa</div></div>
        </div>
        <div class="card"><div class="card-header"><div class="card-title">📊 Comparativa Histórica</div></div><div class="chart-container"><canvas id="historicalChart"></canvas></div></div>
        <div class="card"><div class="card-header"><div class="card-title">🔮 Predicción de Carga (IA)</div></div><div class="chart-container"><canvas id="predictionChart"></canvas></div></div>
    `;
    
    const histCtx = document.getElementById('historicalChart')?.getContext('2d');

// ========== API PLAYGROUND ==========
function renderApiPlayground() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `
        <div class="card"><div class="card-header"><div class="card-title">🧪 API Playground</div></div>
        <div class="api-playground">
            <div class="api-url">
                <select id="apiMethod"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select>
                <input type="text" id="apiEndpoint" placeholder="/api/...">
                <button class="btn btn-primary" onclick="testApi()">Enviar</button>
            </div>
            <textarea class="api-body" id="apiBody" placeholder='Cuerpo de la petición (JSON)...'></textarea>
            <div class="api-response" id="apiResponse">Respuesta aparecerá aquí...</div>
        </div></div>
        <div class="card"><div class="card-header"><div class="card-title">📚 Documentación de Endpoints</div></div>
        <table class="data-table"><thead><tr><th>Método</th><th>Endpoint</th><th>Descripción</th></tr></thead><tbody>
            <tr><td><span class="badge badge-online">GET</span></td><td><code>/api/pay-test</code></td><td>Test de conexión</td></tr>
            <tr><td><span class="badge badge-online">GET</span></td><td><code>/api/credentials/:platform</code></td><td>Credenciales de app</td></tr>
            <tr><td><span class="badge badge-online">POST</span></td><td><code>/api/register-app</code></td><td>Registrar app</td></tr>
            <tr><td><span class="badge badge-online">POST</span></td><td><code>/api/verify-app</code></td><td>Verificar app</td></tr>
            <tr><td><span class="badge badge-online">POST</span></td><td><code>/api/log</code></td><td>Enviar log</td></tr>
        </tbody></table></div>
    `;
}

async function testApi() {
    const method = document.getElementById('apiMethod').value;
    const endpoint = document.getElementById('apiEndpoint').value;
    const body = document.getElementById('apiBody').value;
    const responseDiv = document.getElementById('apiResponse');
    responseDiv.innerHTML = '<span class="loading-spinner"></span> Enviando...';
    try {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (body && (method === 'POST' || method === 'PUT')) options.body = body;
        const res = await fetch(endpoint.startsWith('/') ? endpoint : `/${endpoint}`, options);
        const data = await res.json();
        responseDiv.innerHTML = `<pre style="margin:0">${JSON.stringify(data, null, 2)}</pre>`;
        addLog('playground', 'API test', `${method} ${endpoint} → ${res.status}`, res.ok ? 'info' : 'warning');
    } catch(e) { responseDiv.innerHTML = `❌ Error: ${e.message}`; }
}

// ========== WEBHOOKS ==========
function renderWebhooks() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `
        <div class="card"><div class="card-header"><div class="card-title">🔗 Webhooks Configurados</div><button class="btn btn-primary" onclick="addWebhook()">+ Agregar</button></div>
        ${webhooks.length === 0 ? '<div style="padding:40px;text-align:center;color:#666">No hay webhooks configurados</div>' : webhooks.map(w => `<div class="webhook-item"><div><div class="webhook-url">${w.url}</div><div style="font-size:10px;color:#888">Eventos: ${w.events.join(', ')}</div></div><button class="btn btn-secondary" onclick="deleteWebhook('${w.id}')">Eliminar</button></div>`).join('')}
    `;
}

function addWebhook() {
    const url = prompt('URL del webhook:');
    if (url) {
        const events = prompt('Eventos (separados por coma):', 'all');
        webhooks.push({ id: Date.now().toString(), url, events: events.split(',').map(e => e.trim()) });
        renderWebhooks();
        addLog('system', 'Webhook agregado', url, 'info');
        showToast('✅ Webhook agregado');
    }
}

function deleteWebhook(id) {
    webhooks = webhooks.filter(w => w.id !== id);
    renderWebhooks();
    showToast('🗑 Webhook eliminado');
}

// ========== PRICING ==========
function renderPricing() {
    const container = document.getElementById('mainContent');
    container.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">Free</div><div class="stat-label">10K requests/mes</div><div class="stat-change">$0/mes</div></div>
            <div class="stat-card"><div class="stat-value">Pro</div><div class="stat-label">100K requests/mes</div><div class="stat-change">$29/mes</div></div>
            <div class="stat-card"><div class="stat-value">Business</div><div class="stat-label">1M requests/mes</div><div class="stat-change">$99/mes</div></div>
            <div class="stat-card"><div class="stat-value">Enterprise</div><div class="stat-label">Ilimitado</div><div class="stat-change">$499/mes</div></div>
        </div>
        <div class="card"><div class="card-header"><div class="card-title">💰 Pricing Calculator</div></div><div style="padding:20px"><input type="range" id="requestsSlider" min="0" max="10000000" step="10000" style="width:100%"><div style="margin-top:16px"><div style="font-size:32px;font-weight:800;color:#06b6d4" id="calculatedPrice">$0</div><div>por mes</div></div></div></div>
    `;
    
    const slider = document.getElementById('requestsSlider');
    if (slider) slider.addEventListener('input', (e) => {
        const requests = parseInt(e.target.value);
        let price = 0;
        if (requests <= 10000) price = 0;
        else if (requests <= 100000) price = 29;
        else if (requests <= 1000000) price = 99;
        else price = 499;
        document.getElementById('calculatedPrice').innerHTML = `$${price}`;
    });
}

// ========== EXPORT ==========
function exportLogs() {
    const data = JSON.stringify(logs, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pivot_logs_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📥 Logs exportados');
}

function clearAlerts() {
    alerts = [];
    renderAlerts();
    showToast('✅ Alertas limpiadas');
}

// ========== NAVEGACIÓN ==========
function initNavigation() {
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            item.classList.add('active');
            currentPage = item.dataset.page;
            if (currentPage === 'dashboard') renderDashboard();
            else if (currentPage === 'monitoring') renderMonitoring();
            else if (currentPage === 'apps') renderApps();
            else if (currentPage === 'logs') renderLogs();
            else if (currentPage === 'alerts') renderAlerts();
            else if (currentPage === 'analytics') renderAnalytics();
            else if (currentPage === 'playground') renderApiPlayground();
            else if (currentPage === 'webhooks') renderWebhooks();
            else if (currentPage === 'pricing') renderPricing();
            else if (currentPage === 'security') renderSecurity();
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        });
    });
}

function toggleTheme() {
    const html = document.documentElement;
    if (html.getAttribute('data-theme') === 'light') {
        html.removeAttribute('data-theme');
        showToast('🌙 Modo oscuro');
    } else {
        html.setAttribute('data-theme', 'light');
        showToast('☀️ Modo claro');
    }
}

// ========== INICIALIZACIÓN ==========
async function init() {
    detectUserIP();
    initNavigation();
    renderDashboard();
    
    // Simular actividad periódica
    setInterval(() => {
        const randomApp = apps[Math.floor(Math.random() * apps.length)];
        addLog(randomApp.id, 'Heartbeat', `Latencia: ${randomApp.latency}ms`, 'info');
    }, 60000);
    
    showToast('☁️ Pivot Cloud Enterprise - Panel de Monitoreo');
}

window.testApi = testApi;
window.addWebhook = addWebhook;
window.deleteWebhook = deleteWebhook;
window.exportLogs = exportLogs;
window.clearAlerts = clearAlerts;
window.toggleTheme = toggleTheme;

init();
</script>
