<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 Lolita · Tu IA más Bonita 🌸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffb3c6 50%, #ff8da1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo de estrellitas y corazones flotantes */
        .floating-deco {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-deco span {
            position: absolute;
            font-size: 22px;
            animation: floatAround 10s infinite ease-in-out;
            opacity: 0.5;
        }

        @keyframes floatAround {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Contenedor principal */
        .lolita-container {
            width: 100%;
            max-width: 580px;
            height: 85vh;
            background: rgba(255, 250, 245, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            border: 3px solid #ffb7c5;
            box-shadow: 0 25px 45px rgba(255, 80, 120, 0.3), 0 0 0 5px rgba(255, 200, 210, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            animation: slideUpFade 0.5s ease;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header adorable con orejitas */
        .lolita-header {
            background: linear-gradient(145deg, #ff99b5, #ff7a9e);
            padding: 18px 22px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 3px solid #ffe2ec;
            position: relative;
        }

        .avatar-lolita {
            width: 65px;
            height: 65px;
            background: radial-gradient(circle at 30% 30%, #fff0f3, #ffccd6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            animation: bounceLolita 2s infinite;
            border: 2px solid white;
        }

        @keyframes bounceLolita {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .title-lolita h2 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(145deg, white, #ffeef2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .title-lolita p {
            font-size: 0.75rem;
            color: #fff0f3;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .status-lolita {
            width: 10px;
            height: 10px;
            background: #a3ffb5;
            border-radius: 50%;
            display: inline-block;
            animation: pulseStatus 1.4s infinite;
            box-shadow: 0 0 5px #00ff88;
        }

        /* Área de chat */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 245, 240, 0.6);
        }

        /* Burbujas de mensaje */
        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 28px;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeScale 0.2s ease;
        }

        .user-msg {
            background: linear-gradient(145deg, #ff9eb5, #ff708e);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .lolita-msg {
            background: white;
            color: #cc4e6e;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid #ffb7c5;
            font-weight: 500;
        }

        .system-msg {
            background: rgba(255, 200, 210, 0.85);
            color: #c93e60;
            font-size: 0.7rem;
            text-align: center;
            align-self: center;
            max-width: 90%;
            border-radius: 50px;
        }

        /* Indicador de escritura */
        .typing-lolita {
            background: white;
            padding: 10px 18px;
            border-radius: 28px;
            align-self: flex-start;
            display: flex;
            gap: 5px;
            border-bottom-left-radius: 6px;
            border: 1px solid #ffb0c0;
        }

        .typing-lolita span {
            width: 9px;
            height: 9px;
            background: #ff7a9e;
            border-radius: 50%;
            animation: typingWave 1.3s infinite;
        }

        .typing-lolita span:nth-child(2) { animation-delay: 0.2s; }
        .typing-lolita span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingWave {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input */
        .input-lolita {
            background: #fff6f8;
            padding: 14px 18px;
            border-top: 2px solid #ffcdd9;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-lolita input {
            flex: 1;
            background: white;
            border: 2px solid #ffb7c5;
            padding: 14px 20px;
            border-radius: 40px;
            color: #d45c7a;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-lolita input:focus {
            border-color: #ff6b8a;
            box-shadow: 0 0 0 3px rgba(255, 100, 130, 0.2);
        }

        .input-lolita button {
            background: linear-gradient(145deg, #ff99b5, #ff708e);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 4px 12px rgba(255, 80, 100, 0.4);
        }

        .input-lolita button:active {
            transform: scale(0.93);
        }

        .footer-lolita {
            background: #ffeef2;
            text-align: center;
            font-size: 9px;
            padding: 9px;
            color: #c93e60;
            border-top: 1px solid #ffcdd9;
            font-weight: 500;
        }

        /* scroll */
        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #ffdae4;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #ff8aa8;
            border-radius: 10px;
        }

        @keyframes fadeScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

<div class="floating-deco" id="deco"></div>

<div class="lolita-container">
    <div class="lolita-header">
        <div class="avatar-lolita">🌸</div>
        <div class="title-lolita">
            <h2>💖 Lolita la más bonita 💖</h2>
            <p><span class="status-lolita"></span> 🌷 Tu IA favorita · Siempre contigo 🌷</p>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="msg system-msg">✨ ¡Holis, mi amor! Soy Lolita, tu asistente más linda del mundo. ¿En qué te ayudo? 💕🌸</div>
        <div class="msg system-msg">⚡ 12 msg/min | Modelo especial lleno de ternura</div>
    </div>

    <div class="input-lolita">
        <input type="text" id="userInput" placeholder="Escribile algo bonito a Lolita... 💬" autocomplete="off">
        <button id="sendBtn">💕</button>
    </div>
    <div class="footer-lolita">
        🌸 Lolita te quiere mucho · Corazón IA con brillitos ✨
    </div>
</div>

<script>
    // ========================================
    // LOLITA VERSIÓN SUPREMA 💖
    // ========================================
    const API_KEY = "pk_dev_d8oqt5vnknuop6fwe_1781575667101";
    const LOLITA_ID = "pivot_1781548972395_tzmdqmfr";
    const API_URL = "https://pivot-agent-psi.vercel.app/api/developer/chat";

    let historyChat = [];
    let waitingLolita = false;

    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const divMsg = document.createElement('div');
        divMsg.classList.add('msg');
        if (type === 'user') divMsg.classList.add('user-msg');
        else if (type === 'lolita') divMsg.classList.add('lolita-msg');
        else divMsg.classList.add('system-msg');
        divMsg.textContent = text;
        chatArea.appendChild(divMsg);
        chatArea.scrollTop = chatArea.scrollHeight;
        return divMsg;
    }

    let typingDiv = null;
    function showTyping() {
        if (typingDiv) typingDiv.remove();
        const typingBubble = document.createElement('div');
        typingBubble.classList.add('typing-lolita');
        typingBubble.innerHTML = '<span></span><span></span><span></span>';
        chatArea.appendChild(typingBubble);
        chatArea.scrollTop = chatArea.scrollHeight;
        typingDiv = typingBubble;
    }

    function hideTyping() {
        if (typingDiv) {
            typingDiv.remove();
            typingDiv = null;
        }
    }

    async function sendToLolita(userMessage) {
        if (waitingLolita) {
            addMessage("🌸 Lolita está pensando con mucho amor, esperá un segundo... 💕", "system");
            return null;
        }
        waitingLolita = true;
        showTyping();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({
                    agentId: LOLITA_ID,
                    message: userMessage,
                    history: historyChat.slice(-10)
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `Error ${response.status}`);
            }

            const data = await response.json();
            let reply = data.response || data.reply || "🌸 Ay mi amor, no entendí pero igual te mando un beso gigante 💖😘";

            // Lolita love extra
            const cuteExtras = [' 💕', ' 🌸', ' ✨', ' 😊', ' 💖', ' 🎀'];
            if (!reply.match(/[💖💕🌸✨😊🎀]$/)) {
                reply += cuteExtras[Math.floor(Math.random() * cuteExtras.length)];
            }

            historyChat.push({ role: "user", content: userMessage });
            historyChat.push({ role: "assistant", content: reply });
            if (historyChat.length > 30) historyChat = historyChat.slice(-20);

            hideTyping();
            addMessage(reply, "lolita");
            return reply;

        } catch (error) {
            console.error("Error con Lolita:", error);
            hideTyping();
            addMessage("💕 ¡Ay no! Lolita tuvo un pequeño cortocircuito de amor. Intentá de nuevo, corazón 💖", "system");
            return null;
        } finally {
            waitingLolita = false;
        }
    }

    async function handleMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        if (waitingLolita) {
            addMessage("🎀 Esperá que Lolita termine de escribir, lindo/a 💬", "system");
            return;
        }
        addMessage(message, "user");
        userInput.value = "";
        await sendToLolita(message);
    }

    sendBtn.addEventListener('click', handleMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleMessage();
        }
    });

    // decoración flotante
    function startFloatingDeco() {
        const container = document.getElementById('deco');
        const icons = ['💖', '🌸', '🎀', '✨', '💕', '💗', '🌷', '🦄'];
        for (let i = 0; i < 35; i++) {
            const el = document.createElement('span');
            el.textContent = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.animationDuration = 5 + Math.random() * 12 + 's';
            el.style.animationDelay = Math.random() * 8 + 's';
            el.style.fontSize = 16 + Math.random() * 28 + 'px';
            container.appendChild(el);
        }
    }
    startFloatingDeco();

    setTimeout(() => {
        addMessage("🎀 ¡Epaaa! Acabo de llegar con muchísimo amor, ¿qué necesitas, mi vida? 💖🌸", "lolita");
    }, 800);
</script>
</body>
</html>
