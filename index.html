<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ PivotNano 4.0 | Asistente IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0B1120 0%, #030712 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .chat-container {
            width: 100%;
            max-width: 550px;
            height: 85vh;
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 92, 246, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #1E1B4B, #2E1065, #4C1D95);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(145deg, #8B5CF6, #C084FC);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
            animation: glow 3s infinite;
        }

        .header-text h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 0.7rem;
            color: #C4B5FD;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .status {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 0.9rem;
            line-height: 1.45;
            word-wrap: break-word;
            animation: fadeSlideUp 0.25s ease-out;
        }

        .user-message {
            background: linear-gradient(135deg, #3B82F6, #2563EB);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }

        .bot-message {
            background: rgba(31, 41, 55, 0.9);
            color: #F3F4F6;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(139, 92, 246, 0.4);
        }

        .system-message {
            background: rgba(245, 158, 11, 0.15);
            color: #FBBF24;
            font-size: 0.7rem;
            text-align: center;
            align-self: center;
            max-width: 90%;
            border-radius: 30px;
            border: 0.5px solid #F59E0B;
        }

        .typing {
            background: rgba(31, 41, 55, 0.9);
            padding: 12px 20px;
            border-radius: 24px;
            align-self: flex-start;
            display: flex;
            gap: 6px;
            border-bottom-left-radius: 6px;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #A78BFA;
            border-radius: 50%;
            animation: typingAnim 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        .input-area {
            background: rgba(15, 23, 42, 0.95);
            padding: 16px 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            background: #0F172A;
            border: 1px solid #334155;
            padding: 14px 20px;
            border-radius: 40px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .input-area input::placeholder {
            color: #6B7280;
        }

        .input-area button {
            background: linear-gradient(135deg, #8B5CF6, #A855F7);
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .input-area button:active {
            transform: scale(0.94);
        }

        .footer-info {
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            font-size: 9px;
            padding: 8px;
            color: #6B7280;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 0 20px rgba(139, 92, 246, 0.8); }
        }

        @keyframes typingAnim {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #1E293B;
            border-radius: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: #8B5CF6;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🚀✨</div>
        <div class="header-text">
            <h2>PivotNano 4.0 mini</h2>
            <p><span class="status"></span> asistente • Pivot Enrutador</p>
        </div>
    </div>

    <div class="messages-area" id="messages">
        <div class="message system-message">✨ Hola, soy PivotNano 4.0 mini. ¿En qué puedo ayudarte?</div>
        <div class="message system-message">⚡ Límites: 12 msgs/minuto | 1000/día | 20000/año</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe tu mensaje... 🔍" autocomplete="off">
        <button id="sendBtn">📤</button>
    </div>
    <div class="footer-info">
        🔐 Usando API Key • Bot: PivotNano 4.0 mini
    </div>
</div>

<script>
    // ========================================
    // CONFIGURACIÓN OFICIAL - ENDPOINT PARA DESARROLLADORES
    // ========================================
    const API_KEY = "pk_dev_gj0ahgdvwtj5ifbyh_1781542189880";
    const AGENT_ID = "pivotnano_4.0_mini_official";  // Usando el agente oficial que funciona
    const API_URL = "https://pivot-agent-psi.vercel.app/api/developer/chat";

    let conversationHistory = [];
    let isWaiting = false;

    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        if (type === 'user') msgDiv.classList.add('user-message');
        else if (type === 'bot') msgDiv.classList.add('bot-message');
        else msgDiv.classList.add('system-message');
        msgDiv.textContent = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return msgDiv;
    }

    let typingIndicator = null;
    function showTyping() {
        if (typingIndicator) typingIndicator.remove();
        const typingDiv = document.createElement('div');
        typingDiv.classList.add('typing');
        typingDiv.innerHTML = '<span></span><span></span><span></span>';
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        typingIndicator = typingDiv;
    }

    function hideTyping() {
        if (typingIndicator) {
            typingIndicator.remove();
            typingIndicator = null;
        }
    }

    async function sendToBot(userMessage) {
        if (isWaiting) {
            addMessage("⏳ Espera respuesta anterior", "system");
            return null;
        }

        isWaiting = true;
        showTyping();

        try {
            // Usando el endpoint oficial para desarrolladores
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({
                    agentId: AGENT_ID,
                    message: userMessage,
                    history: conversationHistory.slice(-10)
                })
            });

            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error || `Error ${response.status}`);
            }

            const data = await response.json();
            const botReply = data.response || data.reply || "Respuesta recibida";
            
            conversationHistory.push({ role: "user", content: userMessage });
            conversationHistory.push({ role: "assistant", content: botReply });
            if (conversationHistory.length > 30) conversationHistory = conversationHistory.slice(-20);
            
            hideTyping();
            addMessage(botReply, "bot");
            return botReply;

        } catch (error) {
            console.error("API Error:", error);
            hideTyping();
            addMessage(`❌ ${error.message}`, "system");
            return null;
        } finally {
            isWaiting = false;
        }
    }

    async function handleUserMessage() {
        const message = userInput.value.trim();
        if (!message) return;
        if (isWaiting) {
            addMessage("🔄 Espera respuesta anterior", "system");
            return;
        }

        addMessage(message, "user");
        userInput.value = "";
        await sendToBot(message);
    }

    sendBtn.addEventListener('click', handleUserMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            handleUserMessage();
        }
    });

    setTimeout(() => {
        addMessage(`🔑 Conectado a ${AGENT_ID} | API Key activa`, "system");
    }, 500);
</script>
</body>
</html>
