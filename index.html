<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pivot AI • Asistente Inteligente</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff;height:100vh;display:flex;flex-direction:column}
        .header{display:flex;justify-content:space-between;align-items:center;padding:16px;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06)}
        .logo{display:flex;align-items:center;gap:12px}
        .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#a855f7,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center}
        .logo-text{font-size:18px;font-weight:800;background:linear-gradient(135deg,#a855f7,#7c3aed);-webkit-background-clip:text;background-clip:text;color:transparent}
        .chat-container{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%;padding:20px}
        .messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
        .message{padding:12px16px;border-radius:16px;max-width:80%;word-wrap:break-word}
        .user{background:linear-gradient(135deg,#a855f7,#7c3aed);align-self:flex-end}
        .bot{background:#111;align-self:flex-start}
        .input-area{display:flex;gap:12px;padding:16px;background:#111;border-radius:16px}
        .input-area input{flex:1;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;outline:none}
        .input-area button{padding:12px24px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:12px;color:#fff;cursor:pointer}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1a;padding:10px20px;border-radius:40px;font-size:12px;display:none}
    </style>
</head>
<body>
    <header class="header"><div class="logo"><div class="logo-icon">🧠</div><span class="logo-text">PIVOT AI</span></div></header>
    <div class="chat-container"><div class="messages" id="messages"><div class="message bot">🤖 ¡Hola! Soy Pivot AI. ¿En qué puedo ayudarte?</div></div><div class="input-area"><input type="text" id="userInput" placeholder="Escribe tu mensaje..." onkeypress="if(event.key==='Enter')sendMessage()"><button onclick="sendMessage()">Enviar</button></div></div>
    <div class="toast" id="toastEl"></div>
    <script>
        const GROQ_API_KEY='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';
        const GROQ_MODEL='meta-llama/llama-4-scout-17b-16e-instruct';
        async function sendMessage(){const input=document.getElementById('userInput');const text=input.value.trim();if(!text)return;addMessage(text,'user');input.value='';addMessage('🤔 Pensando...','bot');try{const response=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Authorization':`Bearer ${GROQ_API_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({model:GROQ_MODEL,messages:[{role:'user',content:text}],temperature:0.7,max_tokens:500})});const data=await response.json();const lastMessage=document.getElementById('messages').lastElementChild;if(lastMessage&&lastMessage.classList.contains('bot'))lastMessage.remove();addMessage(data.choices[0].message.content,'bot')}catch(e){const lastMessage=document.getElementById('messages').lastElementChild;if(lastMessage&&lastMessage.classList.contains('bot'))lastMessage.remove();addMessage('⚠️ Error de conexión','bot')}}
        function addMessage(text,type){const container=document.getElementById('messages');const div=document.createElement('div');div.className=`message ${type}`;div.textContent=text;container.appendChild(div);container.scrollTop=container.scrollHeight}
        function toast(msg){const t=document.getElementById('toastEl');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
        window.sendMessage=sendMessage;
    </script>
</body>
</html>
