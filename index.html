<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nebula Ultra · Pivot Cloud Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 10% 20%, #030712, #000000);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: #10b98120;
            border: 1px solid #10b981;
            color: #10b981;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: rgba(5, 10, 25, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            border: 1px solid rgba(96, 165, 250, 0.25);
            padding: 1.5rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            border-bottom: 1px dashed #2d3a5e;
            padding-bottom: 0.5rem;
        }

        .upload-zone {
            border: 2px dashed #4b5563;
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0,0,0,0.3);
        }

        .upload-zone:hover {
            border-color: #c084fc;
            background: rgba(192, 132, 252, 0.1);
        }

        #fileInput {
            display: none;
        }

        video {
            max-width: 100%;
            max-height: 150px;
            border-radius: 12px;
            margin-top: 0.5rem;
        }

        button {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.7rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.8rem;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            font-size: 0.75rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
            background: #0f172a80;
            margin-top: 0.5rem;
            word-break: break-all;
        }

        .status.connected {
            background: #10b98120;
            border: 1px solid #10b981;
            color: #10b981;
        }

        .status.error {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #f87171;
        }

        .video-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .video-item {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 0.75rem;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .video-thumb {
            width: 70px;
            height: 50px;
            background: #0f172a;
            border-radius: 6px;
            object-fit: cover;
            cursor: pointer;
        }

        .video-info {
            flex: 1;
            font-size: 0.7rem;
        }

        .video-name {
            font-weight: 700;
            margin-bottom: 0.2rem;
            word-break: break-all;
        }

        .delete-btn {
            background: #ef4444;
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
            width: auto;
            margin-top: 0;
        }

        .flex-btns {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .small-btn {
            background: #1e2a4a;
            padding: 0.4rem;
            font-size: 0.7rem;
            margin-top: 0;
        }

        .debug {
            margin-top: 1.5rem;
            background: #0f172a;
            border-radius: 0.75rem;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.7rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .key-display {
            background: #1e293b;
            padding: 0.3rem 0.6rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.65rem;
            margin-top: 0.5rem;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        🌌 NEBULA ULTRA
        <span class="badge">Pivot Cloud v2</span>
    </div>
    <div class="subtitle">Almacenamiento real en la nube · App registrada automáticamente</div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title">📤 Subir video</div>
            <div class="upload-zone" id="uploadZone">
                <div style="font-size: 2rem;">🎥</div>
                <p>Seleccionar archivo<br><small>MP4, MOV, webm · hasta 15MB</small></p>
                <input type="file" id="fileInput" accept="video/*">
            </div>
            <div id="previewContainer"></div>
            <div id="uploadStatus" class="status"></div>
            <button id="uploadBtn" disabled>🚀 Subir a Pivot Cloud</button>
        </div>

        <div class="card">
            <div class="card-title">📁 Nebula Drive</div>
            <div id="videoListContainer" class="video-list">
                <div style="text-align:center; padding:1rem;">Cargando...</div>
            </div>
            <div class="flex-btns">
                <button id="refreshBtn" class="small-btn">🔄 Sincronizar</button>
                <button id="clearAllBtn" class="small-btn" style="background:#7f1a1a;">🗑️ Borrar todo</button>
            </div>
        </div>
    </div>

    <div class="debug" id="debug">
        <strong>🔍 Console Log:</strong><br>
        Iniciando Nebula Ultra...
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURACIÓN - USANDO EL PROJECT QUE PIVOT CLOUD ESPERA
    // ============================================================
    const PIVOT_CLOUD_URL = 'https://pivot-cloud.vercel.app';
    // El error dice "project pivot-lax" -> usamos eso como appId
    const APP_ID = 'pivot-lax';
    
    // La llave de la app se guarda LOCALMENTE
    let APP_KEY = localStorage.getItem(`pivot_${APP_ID}_key`);
    let videos = [];
    let appRegistered = false;
    
    function addLog(msg, type = 'info') {
        const debugDiv = document.getElementById('debug');
        const time = new Date().toLocaleTimeString();
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: '📡' };
        const icon = icons[type] || '📡';
        debugDiv.innerHTML += `<br>${time}: ${icon} ${msg}`;
        debugDiv.scrollTop = debugDiv.scrollHeight;
        console.log(msg);
    }
    
    function updateUIStatus(message, isConnected = false, isError = false) {
        const statusDiv = document.getElementById('uploadStatus');
        statusDiv.innerHTML = message;
        statusDiv.className = 'status';
        if (isConnected) statusDiv.classList.add('connected');
        if (isError) statusDiv.classList.add('error');
    }
    
    // ============================================================
    // 1. REGISTRAR APP EN PIVOT CLOUD - FORZADO
    // ============================================================
    async function registerApp() {
        addLog(`🔐 Registrando app "${APP_ID}" en Pivot Cloud...`, 'info');
        updateUIStatus('Registrando app en Pivot Cloud...', false, false);
        
        try {
            const response = await fetch(`${PIVOT_CLOUD_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    appId: APP_ID,
                    publicKey: `${APP_ID}_public_key_v1`,
                    credentials: { 
                        version: '2.0', 
                        platform: 'web',
                        name: 'Nebula Ultra',
                        description: 'Almacenamiento de videos en la nube'
                    }
                })
            });
            
            const data = await response.json();
            addLog(`Respuesta registro: ${JSON.stringify(data)}`, 'info');
            
            if (data.success && data.appKey) {
                APP_KEY = data.appKey;
                localStorage.setItem(`pivot_${APP_ID}_key`, APP_KEY);
                appRegistered = true;
                addLog(`✅ APP REGISTRADA CON ÉXITO! Llave: ${APP_KEY.substring(0, 40)}...`, 'success');
                updateUIStatus(`✅ Conectado a Pivot Cloud · App registrada`, true, false);
                return true;
            } else {
                addLog(`❌ Error registrando: ${data.error || data.message || 'Respuesta inválida'}`, 'error');
                updateUIStatus(`❌ Error: ${data.error || data.message || 'No se pudo registrar'}`, false, true);
                
                // Si el error es PERMISSION_DENIED, probamos con otro appId
                if (data.error && data.error.includes('PERMISSION_DENIED')) {
                    addLog(`⚠️ Probando con appId alternativo...`, 'warning');
                    return await tryAlternativeAppId();
                }
                return false;
            }
        } catch(e) {
            addLog(`❌ Error de red: ${e.message}`, 'error');
            updateUIStatus(`❌ Error de conexión: ${e.message}`, false, true);
            return false;
        }
    }
    
    // Intentar con diferentes appId
    async function tryAlternativeAppId() {
        const alternatives = ['lax', 'nebula', 'nebula-ultra', 'pivot', 'pivot-lax-v2'];
        
        for (const altId of alternatives) {
            addLog(`🔄 Probando con appId: "${altId}"...`, 'info');
            
            try {
                const response = await fetch(`${PIVOT_CLOUD_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        appId: altId,
                        publicKey: `${altId}_public_key`,
                        credentials: { version: '2.0', platform: 'web', name: 'Nebula Ultra' }
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.appKey) {
                    // Actualizar APP_ID global
                    window.APP_ID = altId;
                    APP_KEY = data.appKey;
                    localStorage.setItem(`pivot_${altId}_key`, APP_KEY);
                    appRegistered = true;
                    addLog(`✅ Registro exitoso con appId: "${altId}"!`, 'success');
                    updateUIStatus(`✅ Conectado a Pivot Cloud · App: ${altId}`, true, false);
                    return true;
                }
            } catch(e) {
                // Continuar con siguiente
            }
        }
        
        return false;
    }
    
    // ============================================================
    // 2. LLAMADA A PIVOT CLOUD CON AUTENTICACIÓN
    // ============================================================
    async function callPivotCloud(endpoint, options = {}) {
        if (!APP_KEY) {
            throw new Error('App no registrada');
        }
        
        const response = await fetch(`${PIVOT_CLOUD_URL}/api/${endpoint}`, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${APP_KEY}`,
                ...options.headers
            }
        });
        
        const text = await response.text();
        try {
            return JSON.parse(text);
        } catch(e) {
            return { success: false, raw: text, error: 'Invalid JSON response' };
        }
    }
    
    // ============================================================
    // 3. GUARDAR VIDEOS EN LA NUBE
    // ============================================================
    async function saveVideosToCloud() {
        if (!APP_KEY || !appRegistered) {
            addLog(`❌ No se puede guardar: app no registrada`, 'error');
            return false;
        }
        
        try {
            addLog(`💾 Guardando ${videos.length} videos en Pivot Cloud...`, 'info');
            const result = await callPivotCloud(`env/${APP_ID}`, {
                method: 'POST',
                body: JSON.stringify({
                    key: 'nebula_videos',
                    value: JSON.stringify(videos)
                })
            });
            
            if (result.success) {
                addLog(`✅ ${videos.length} videos guardados en la nube`, 'success');
                return true;
            } else {
                addLog(`⚠️ Error guardando: ${JSON.stringify(result)}`, 'warning');
                return false;
            }
        } catch(e) {
            addLog(`❌ Error: ${e.message}`, 'error');
            return false;
        }
    }
    
    // ============================================================
    // 4. CARGAR VIDEOS DESDE LA NUBE
    // ============================================================
    async function loadVideosFromCloud() {
        if (!APP_KEY || !appRegistered) {
            addLog(`❌ No se puede cargar: app no registrada`, 'error');
            return null;
        }
        
        try {
            addLog(`📥 Cargando videos desde Pivot Cloud...`, 'info');
            const result = await callPivotCloud(`env/${APP_ID}`);
            
            if (result.success && result.data && result.data.nebula_videos) {
                const cloudVideos = JSON.parse(result.data.nebula_videos);
                addLog(`✅ Cargados ${cloudVideos.length} videos desde la nube`, 'success');
                return cloudVideos;
            } else {
                addLog(`📭 No hay videos en la nube o error`, 'info');
                return [];
            }
        } catch(e) {
            addLog(`❌ Error cargando: ${e.message}`, 'error');
            return null;
        }
    }
    
    // ============================================================
    // 5. REGISTRAR LOG
    // ============================================================
    async function logAction(action, details) {
        if (!APP_KEY || !appRegistered) return;
        
        try {
            await callPivotCloud('log', {
                method: 'POST',
                body: JSON.stringify({
                    appId: APP_ID,
                    action: action,
                    details: details
                })
            });
            addLog(`📝 Log: ${action}`, 'info');
        } catch(e) {
            // No crítico
        }
    }
    
    // ============================================================
    // 6. SINCRONIZAR
    // ============================================================
    async function syncWithCloud() {
        addLog(`🔄 Sincronizando con Pivot Cloud...`, 'info');
        
        if (!appRegistered) {
            addLog(`❌ App no registrada, no se puede sincronizar`, 'error');
            return false;
        }
        
        const cloudVideos = await loadVideosFromCloud();
        
        if (cloudVideos && cloudVideos.length > 0) {
            videos = cloudVideos;
            localStorage.setItem('nebula_videos', JSON.stringify(videos));
            renderVideos();
            addLog(`📥 Sincronizado: ${videos.length} videos desde la nube`, 'success');
        } else if (videos.length > 0) {
            await saveVideosToCloud();
        }
        
        return true;
    }
    
    // ============================================================
    // RENDERIZAR VIDEOS
    // ============================================================
    function renderVideos() {
        const container = document.getElementById('videoListContainer');
        
        if (!videos.length) {
            container.innerHTML = '<div style="text-align:center; padding:1.5rem;">🌙 Vacío estelar · sube un video</div>';
            return;
        }
        
        container.innerHTML = '';
        videos.forEach((video, index) => {
            const div = document.createElement('div');
            div.className = 'video-item';
            div.innerHTML = `
                <video class="video-thumb" src="${video.dataURL}" muted></video>
                <div class="video-info">
                    <div class="video-name">${escapeHtml(video.name)}</div>
                    <div>${(video.size / 1024 / 1024).toFixed(2)} MB</div>
                    <div>${new Date(video.uploadedAt).toLocaleString()}</div>
                </div>
                <button class="delete-btn" data-index="${index}">🗑️</button>
            `;
            container.appendChild(div);
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const index = parseInt(btn.dataset.index);
                if (confirm(`¿Eliminar ${videos[index].name}?`)) {
                    const deleted = videos.splice(index, 1)[0];
                    localStorage.setItem('nebula_videos', JSON.stringify(videos));
                    renderVideos();
                    addLog(`🗑️ Eliminado: ${deleted.name}`, 'success');
                    await saveVideosToCloud();
                    await logAction('VIDEO_DELETED', deleted.name);
                }
            });
        });
        
        document.querySelectorAll('.video-thumb').forEach(vid => {
            vid.addEventListener('mouseenter', () => vid.play().catch(e => {}));
            vid.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
        });
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============================================================
    // SUBIR VIDEO
    // ============================================================
    let selectedFile = null;
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const previewContainer = document.getElementById('previewContainer');
    const uploadBtn = document.getElementById('uploadBtn');
    
    uploadZone.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            selectedFile = e.target.files[0];
            if (selectedFile.size > 15 * 1024 * 1024) {
                updateUIStatus('❌ El video no puede superar 15MB', false, true);
                selectedFile = null;
                uploadBtn.disabled = true;
                return;
            }
            const url = URL.createObjectURL(selectedFile);
            previewContainer.innerHTML = `<video src="${url}" controls style="max-width:100%; max-height:120px"></video>`;
            uploadBtn.disabled = false;
            updateUIStatus('✅ Video seleccionado. Listo para subir a la nube.', true, false);
        } else {
            selectedFile = null;
            previewContainer.innerHTML = '';
            uploadBtn.disabled = true;
        }
    });
    
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        if (!appRegistered) {
            updateUIStatus('❌ Esperando registro de app... intenta de nuevo en unos segundos', false, true);
            return;
        }
        
        uploadBtn.disabled = true;
        updateUIStatus('📀 Procesando video...', false, false);
        
        try {
            const reader = new FileReader();
            const dataURL = await new Promise((resolve, reject) => {
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(selectedFile);
            });
            
            const newVideo = {
                id: Date.now(),
                name: selectedFile.name,
                size: selectedFile.size,
                dataURL: dataURL,
                uploadedAt: new Date().toISOString()
            };
            
            videos.unshift(newVideo);
            localStorage.setItem('nebula_videos', JSON.stringify(videos));
            renderVideos();
            
            // Guardar en la nube
            const saved = await saveVideosToCloud();
            await logAction('VIDEO_UPLOADED', `${selectedFile.name} (${(selectedFile.size/1024/1024).toFixed(2)}MB)`);
            
            if (saved) {
                updateUIStatus(`✅ ${selectedFile.name} subido a Pivot Cloud`, true, false);
            } else {
                updateUIStatus(`⚠️ ${selectedFile.name} guardado localmente, pero no en la nube`, false, true);
            }
            
            selectedFile = null;
            fileInput.value = '';
            previewContainer.innerHTML = '';
            uploadBtn.disabled = false;
            
            setTimeout(() => {
                if (updateUIStatus) {
                    updateUIStatus('✅ Listo', true, false);
                }
            }, 3000);
            
        } catch(err) {
            updateUIStatus(`❌ Error: ${err.message}`, false, true);
            addLog(`Error: ${err.message}`, 'error');
            uploadBtn.disabled = false;
        }
    });
    
    // Botones
    document.getElementById('refreshBtn').addEventListener('click', async () => {
        await syncWithCloud();
        renderVideos();
    });
    
    document.getElementById('clearAllBtn').addEventListener('click', async () => {
        if (confirm('⚠️ ¿Eliminar TODOS los videos? Esta acción es irreversible.')) {
            videos = [];
            localStorage.setItem('nebula_videos', JSON.stringify(videos));
            renderVideos();
            addLog(`🗑️ Todos los videos eliminados`, 'warning');
            await saveVideosToCloud();
            await logAction('ALL_VIDEOS_DELETED', 'Borrado completo');
        }
    });
    
    // ============================================================
    // INICIALIZACIÓN - REGISTRAR APP SÍ O SÍ
    // ============================================================
    async function init() {
        addLog(`🚀 NEBULA ULTRA - Conectando a Pivot Cloud...`, 'success');
        addLog(`📱 App ID: ${APP_ID}`, 'info');
        
        // Cargar videos locales primero
        const saved = localStorage.getItem('nebula_videos');
        if (saved) {
            try {
                videos = JSON.parse(saved);
                addLog(`📹 ${videos.length} videos locales cargados`, 'info');
            } catch(e) {}
        }
        renderVideos();
        
        // REGISTRAR LA APP - ESTO ES CRÍTICO
        const registered = await registerApp();
        
        if (registered) {
            addLog(`🎉 APP REGISTRADA EXITOSAMENTE EN PIVOT CLOUD`, 'success');
            // Intentar cargar videos desde la nube
            await syncWithCloud();
        } else {
            addLog(`⚠️ No se pudo registrar la app. Verifica la conexión a internet.`, 'error');
            updateUIStatus('❌ No conectado a Pivot Cloud - Revisa tu conexión', false, true);
        }
        
        addLog(`✅ Nebula Ultra lista.`, 'success');
    }
    
    init();
</script>
</body>
</html>
