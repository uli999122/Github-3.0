<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <title>Pivot Cloud • Sistema Hiper Controlado</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- CryptoJS para cifrado local -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #0f0f0f;
            --surface-elevated: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #06b6d4;
            --accent-dark: #0891b2;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --gradient: linear-gradient(135deg, #06b6d4, #0891b2);
            --gradient-danger: linear-gradient(135deg, #ef4444, #dc2626);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text-primary);
            min-height: 100vh;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); } 50% { box-shadow: 0 0 40px rgba(6, 182, 212, 0.4); } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .app-container { min-height: 100vh; background: var(--bg); }
        
        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 44px; height: 44px; background: var(--gradient); border-radius: 14px; display: flex; align-items: center; justify-content: center; animation: glow 3s infinite; }
        .logo-text { font-size: 20px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: rgba(6, 182, 212, 0.15); color: var(--accent); }
        .security-level { font-size: 10px; padding: 4px 12px; border-radius: 20px; background: rgba(16, 185, 129, 0.12); color: var(--success); display: flex; align-items: center; gap: 6px; }
        .security-level.critical { background: rgba(239, 68, 68, 0.12); color: var(--danger); }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }
        .login-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 100%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-danger { background: var(--gradient-danger); color: white; }

        /* Layout */
        .layout { display: flex; min-height: calc(100vh - 73px); }
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            padding: 20px 0;
            position: sticky;
            top: 73px;
            height: calc(100vh - 73px);
            overflow-y: auto;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        .nav-item:hover { background: rgba(6, 182, 212, 0.05); }
        .nav-item.active { background: rgba(6, 182, 212, 0.1); color: var(--accent); border-right: 3px solid var(--accent); }
        .nav-icon { width: 20px; height: 20px; }

        .main-content { flex: 1; padding: 24px; overflow-y: auto; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stat-value { font-size: 32px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .card-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

        /* Tabla */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.04); }
        .data-table th { color: var(--text-secondary); font-weight: 600; font-size: 12px; }

        /* Badges */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .badge-admin { background: rgba(6, 182, 212, 0.15); color: var(--accent); }
        .badge-viewer { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .badge-auditor { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .badge-suspicious { background: rgba(239, 68, 68, 0.15); color: var(--danger); animation: pulse 1s infinite; }

        /* Alertas */
        .alert-item {
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .alert-item.critical { background: rgba(239, 68, 68, 0.1); border-left: 3px solid var(--danger); }
        .alert-item.warning { background: rgba(245, 158, 11, 0.1); border-left: 3px solid var(--warning); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid rgba(6, 182, 212, 0.3);
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 2000;
            display: none;
        }

        /* IA Status */
        .ia-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            font-size: 11px;
        }
        .ia-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 1s infinite;
        }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -260px; z-index: 200; transition: all 0.3s; }
            .sidebar.open { left: 0; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <div class="logo-icon" style="margin: 0 auto 20px; width: 56px; height: 56px;">☁️</div>
        <h2 style="text-align: center; margin-bottom: 8px;">Pivot Cloud</h2>
        <p style="text-align: center; color: #888; margin-bottom: 24px;">Sistema Hiper Controlado</p>
        <input type="text" id="loginUser" class="input-field" placeholder="Usuario">
        <input type="password" id="loginPass" class="input-field" placeholder="Contraseña">
        <button class="btn btn-primary" onclick="PivotCloud.login()">Acceder</button>
        <p style="text-align: center; font-size: 11px; color: #666; margin-top: 16px;">Acceso restringido. Solo personal autorizado.</p>
    </div>
</div>

<!-- Main App -->
<div class="app-container" id="mainApp" style="display: none;">
    <header class="header">
        <div class="logo">
            <div class="logo-icon">☁️</div>
            <span class="logo-text">PIVOT CLOUD</span>
            <span class="logo-badge">v5.0 • HIPER CONTROLADO</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div class="ia-status">
                <div class="ia-dot"></div>
                <span>IA Vigilante Activa</span>
            </div>
            <div class="security-level" id="securityLevel">🔒 Nivel 3</div>
            <button class="btn" onclick="PivotCloud.logout()" style="width: auto; padding: 8px 16px; background: rgba(239,68,68,0.1); color: #ef4444;">Salir</button>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <nav>
                <div class="nav-item active" data-page="dashboard">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item" data-page="apps">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
                    <span>Apps Conectadas</span>
                </div>
                <div class="nav-item" data-page="users">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Usuarios</span>
                </div>
                <div class="nav-item" data-page="logs">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 12v8H4v-8M12 2v12m-4-4l4 4 4-4"/></svg>
                    <span>Logs de Auditoría</span>
                </div>
                <div class="nav-item" data-page="alerts">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <span>Alertas IA</span>
                </div>
                <div class="nav-item" data-page="encryption">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <span>Cifrado</span>
                </div>
            </nav>
        </aside>

        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
// ============================================
// PIVOT CLOUD v5.0 - SISTEMA HIPER CONTROLADO
// IA ESTRICTA + ROLES + CIFRADO + AUDITORÍA
// ============================================

const PivotCloud = (function() {
    // ========== CONFIGURACIÓN ==========
    let currentUser = null;
    let currentRole = null;
    let currentPage = 'dashboard';
    
    // Datos del sistema
    let apps = [];
    let users = [];
    let auditLogs = [];
    let alerts = [];
    
    // Clave maestra para cifrado (solo en memoria, nunca se guarda)
    let masterKey = null;
    
    // ========== USUARIOS AUTORIZADOS ==========
    const AUTHORIZED_USERS = [
        { username: 'admin', password: 'admin123', role: 'admin', name: 'Administrador', permissions: ['all'] },
        { username: 'auditor', password: 'auditor123', role: 'auditor', name: 'Auditor', permissions: ['view_logs', 'view_alerts'] },
        { username: 'viewer', password: 'viewer123', role: 'viewer', name: 'Visualizador', permissions: ['view_dashboard', 'view_apps'] }
    ];
    
    // ========== APPS DEL ECOSISTEMA ==========
    const ECOSYSTEM_APPS = [
        { id: 'lax', name: 'Pivot Lax', status: 'online', type: 'social', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'pay', name: 'Pivot Pay', status: 'online', type: 'finance', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'manager', name: 'Pivot Manager', status: 'online', type: 'business', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'ai', name: 'Pivot AI', status: 'online', type: 'ai', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'backup', name: 'Pivot Backup', status: 'online', type: 'storage', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'auth', name: 'Pivot Auth', status: 'online', type: 'security', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'tv', name: 'Pivot TV', status: 'online', type: 'entertainment', lastSeen: new Date().toISOString(), encrypted: true },
        { id: 'music', name: 'Pivot Music', status: 'online', type: 'entertainment', lastSeen: new Date().toISOString(), encrypted: true }
    ];
    
    // ========== IA ESTRICTA - ANÁLISIS DE COMPORTAMIENTO ==========
    class IntelligentAgent {
        constructor() {
            this.suspicionLevels = new Map();
            this.bannedActions = ['copy_credentials', 'export_sensitive', 'bulk_delete', 'role_escalation'];
        }
        
        analyzeAction(user, action, target, details) {
            const now = Date.now();
            let userData = this.suspicionLevels.get(user) || { score: 0, actions: [], lastWarning: 0 };
            
            // Calcular nivel de sospecha
            let suspicionIncrease = 0;
            let reason = '';
            
            if (this.bannedActions.includes(action)) {
                suspicionIncrease = 50;
                reason = `⚠️ ACCIÓN PROHIBIDA: ${action}`;
            }
            
            if (action === 'view_credentials') {
                suspicionIncrease = 20;
                reason = '🚨 Intento de ver credenciales - No autorizado';
            }
            
            if (action === 'export_data' && userData.actions.filter(a => a.action === 'export_data').length > 3) {
                suspicionIncrease = 30;
                reason = '📤 Múltiples exportaciones de datos - Posible fuga';
            }
            
            if (action === 'login' && userData.actions.filter(a => a.action === 'login' && (now - a.timestamp) < 60000).length > 5) {
                suspicionIncrease = 40;
                reason = '🔐 Múltiples intentos de login en corto tiempo';
            }
            
            userData.score += suspicionIncrease;
            userData.actions.push({ action, target, details, timestamp: now });
            
            // Mantener solo últimas 100 acciones
            if (userData.actions.length > 100) userData.actions.shift();
            
            this.suspicionLevels.set(user, userData);
            
            // Registrar en logs de auditoría
            this.addAuditLog(user, action, target, details, suspicionIncrease > 0 ? 'warning' : 'info');
            
            // Si supera umbral, crear alerta crítica
            if (userData.score >= 100) {
                this.createCriticalAlert(user, `Comportamiento altamente sospechoso - Score: ${userData.score}`, reason);
                userData.score = 0;
                this.suspicionLevels.set(user, userData);
            } else if (userData.score >= 50 && (now - userData.lastWarning) > 30000) {
                this.createAlert(user, `Comportamiento sospechoso detectado - Score: ${userData.score}`, reason);
                userData.lastWarning = now;
                this.suspicionLevels.set(user, userData);
            }
            
            return { allowed: userData.score < 100, suspicion: userData.score, reason };
        }
        
        addAuditLog(user, action, target, details, severity) {
            auditLogs.unshift({
                id: Date.now(),
                user,
                action,
                target,
                details,
                severity,
                timestamp: new Date().toISOString(),
                ip: 'internal'
            });
            if (auditLogs.length > 1000) auditLogs.pop();
        }
        
        createAlert(user, message, reason) {
            alerts.unshift({
                id: Date.now(),
                user,
                message,
                reason,
                severity: 'warning',
                timestamp: new Date().toISOString(),
                read: false
            });
            this.showToast(`⚠️ ALERTA IA: ${message}`, true);
        }
        
        createCriticalAlert(user, message, reason) {
            alerts.unshift({
                id: Date.now(),
                user,
                message,
                reason,
                severity: 'critical',
                timestamp: new Date().toISOString(),
                read: false
            });
            this.showToast(`🔴 ALERTA CRÍTICA IA: ${message}`, true);
            
            // Bloquear usuario temporalmente
            this.showToast(`🚫 Usuario ${user} bloqueado por comportamiento sospechoso`, true);
        }
        
        showToast(msg, isError = false) {
            const toast = document.getElementById('toastEl');
            toast.textContent = msg;
            toast.style.display = 'block';
            if (isError) toast.style.borderColor = '#ef4444';
            setTimeout(() => toast.style.display = 'none', 4000);
        }
    }
    
    const IA = new IntelligentAgent();
    
    // ========== CIFRADO AES-256 ==========
    function encryptData(data, key) {
        return CryptoJS.AES.encrypt(JSON.stringify(data), key).toString();
    }
    
    function decryptData(encrypted, key) {
        try {
            const bytes = CryptoJS.AES.decrypt(encrypted, key);
            return JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
        } catch(e) {
            return null;
        }
    }
    
    // ========== RENDERIZADO ==========
    function renderDashboard() {
        const online = apps.filter(a => a.status === 'online').length;
        const total = apps.length;
        
        document.getElementById('mainContent').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Apps Conectadas</div><div style="font-size:11px;color:#10b981">🟢 ${online} activas</div></div>
                <div class="stat-card"><div class="stat-value">${users.length}</div><div class="stat-label">Usuarios Autorizados</div></div>
                <div class="stat-card"><div class="stat-value">${auditLogs.length}</div><div class="stat-label">Eventos Auditados</div></div>
                <div class="stat-card"><div class="stat-value">${alerts.filter(a => !a.read).length}</div><div class="stat-label">Alertas Activas</div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">🤖 Estado de la IA Vigilante</div></div>
                <div style="background: rgba(6,182,212,0.05); border-radius: 12px; padding: 16px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span>Nivel de seguridad</span>
                        <span style="color: #10b981;">● ACTIVO</span>
                    </div>
                    <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;">
                        <div style="width: 100%; height: 100%; background: var(--gradient); border-radius: 2px;"></div>
                    </div>
                    <div style="margin-top: 16px; font-size: 12px; color: #888;">
                        La IA monitorea constantemente todos los accesos, acciones y comportamientos en busca de patrones sospechosos.
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">📋 Últimos Accesos Auditados</div></div>
                <table class="data-table">
                    <thead><tr><th>Hora</th><th>Usuario</th><th>Acción</th><th>Detalles</th><th>Estado</th></tr></thead>
                    <tbody>${auditLogs.slice(0, 10).map(l => `<tr><td style="font-size:11px">${new Date(l.timestamp).toLocaleTimeString()}</td><td><strong>${l.user}</strong></td><td>${l.action}</td><td style="color:#888">${l.details || '—'}</td><td>${l.severity === 'warning' ? '<span class="badge-suspicious" style="padding:2px 6px">⚠️</span>' : '<span style="color:#10b981">✓</span>'}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    }
    
    function renderApps() {
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-header"><div class="card-title">📱 Apps del Ecosistema</div></div>
                <table class="data-table">
                    <thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Estado</th><th>Cifrado</th><th>Última conexión</th></tr></thead>
                    <tbody>${apps.map(a => `<tr><td><code>${a.id}</code></td><td><strong>${a.name}</strong></td><td>${a.type}</td><td><span class="status-${a.status}"><span class="dot ${a.status}"></span> ${a.status}</span></td><td>${a.encrypted ? '🔒 AES-256' : '❌'}</td><td>${new Date(a.lastSeen).toLocaleString()}</td></tr>`).join('')}</tbody>
                </table>
                <div class="card-header" style="margin-top: 20px;"><div class="card-title">⚠️ Política de Seguridad</div></div>
                <div style="padding: 12px; background: rgba(239,68,68,0.05); border-radius: 8px;">
                    <div style="font-size: 12px; color: #ef4444;">🚫 Las credenciales de las apps NO son visibles para ningún usuario.</div>
                    <div style="font-size: 12px; color: #ef4444; margin-top: 8px;">🔒 Todo el tráfico entre apps está cifrado extremo a extremo.</div>
                    <div style="font-size: 12px; color: #ef4444; margin-top: 8px;">🤖 La IA detecta y bloquea automáticamente cualquier intento de acceso no autorizado.</div>
                </div>
            </div>
        `;
    }
    
    function renderUsers() {
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-header"><div class="card-title">👥 Usuarios Autorizados</div></div>
                <table class="data-table">
                    <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Permisos</th><th>Estado</th></tr></thead>
                    <tbody>${users.map(u => `<tr><td><code>${u.username}</code></td><td>${u.name}</td><td><span class="badge-${u.role}">${u.role.toUpperCase()}</span></td><td>${u.permissions.join(', ')}</td><td>🟢 Activo</td></tr>`).join('')}</tbody>
                </table>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title">📜 Política de Acceso</div></div>
                <div style="font-size: 13px; line-height: 1.6; color: #888;">
                    <p>✅ Solo personal autorizado puede acceder a Pivot Cloud.</p>
                    <p>✅ Cada acción es auditada y registrada permanentemente.</p>
                    <p>✅ La IA analiza patrones de comportamiento en tiempo real.</p>
                    <p>✅ Intentos de acceso no autorizados generan alertas inmediatas.</p>
                    <p>✅ Credenciales de apps NUNCA son visibles para usuarios humanos.</p>
                </div>
            </div>
        `;
    }
    
    function renderLogs() {
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-header"><div class="card-title">📝 Logs de Auditoría</div><button class="btn" style="width:auto;padding:6px 12px" onclick="PivotCloud.exportLogs()">📥 Exportar</button></div>
                <table class="data-table">
                    <thead><tr><th>Hora</th><th>Usuario</th><th>Acción</th><th>Destino</th><th>Detalles</th><th>Severidad</th></tr></thead>
                    <tbody>${auditLogs.map(l => `<tr><td style="font-size:11px">${new Date(l.timestamp).toLocaleString()}</td><td><strong>${l.user}</strong></td><td>${l.action}</td><td>${l.target || '—'}</td><td style="color:#888">${l.details || '—'}</td><td>${l.severity === 'warning' ? '<span style="color:#f59e0b">⚠️</span>' : '<span style="color:#10b981">✓</span>'}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;
    }
    
    function renderAlerts() {
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-header"><div class="card-title">⚠️ Alertas de la IA</div><button class="btn" style="width:auto;padding:6px 12px" onclick="PivotCloud.clearAlerts()">Limpiar</button></div>
                ${alerts.length === 0 ? '<div style="padding: 40px; text-align: center; color: #666;">✅ No hay alertas activas</div>' : alerts.map(a => `<div class="alert-item ${a.severity}"><div><strong>${a.message}</strong><div style="font-size:12px;color:#888">${a.reason}</div><div style="font-size:10px;color:#666">Usuario: ${a.user} • ${new Date(a.timestamp).toLocaleString()}</div></div></div>`).join('')}
            </div>
        `;
    }
    
    function renderEncryption() {
        document.getElementById('mainContent').innerHTML = `
            <div class="card">
                <div class="card-header"><div class="card-title">🔐 Cifrado de Extremo a Extremo</div></div>
                <div style="padding: 20px; background: rgba(6,182,212,0.05); border-radius: 12px; margin-bottom: 20px;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                        <span style="font-size: 32px;">🔒</span>
                        <div><strong>AES-256 Encryption</strong><br><span style="font-size: 12px; color: #888;">Estándar militar - Grado bancario</span></div>
                    </div>
                    <div style="font-size: 13px; line-height: 1.6;">
                        <p>✅ Todos los datos sensibles están cifrados con AES-256.</p>
                        <p>✅ Las claves de cifrado nunca salen del dispositivo.</p>
                        <p>✅ Modo zero-knowledge: Ni siquiera nosotros podemos ver tus datos.</p>
                        <p>✅ Verificación de integridad con HMAC-SHA256.</p>
                    </div>
                </div>
                <div style="padding: 20px; background: rgba(16,185,129,0.05); border-radius: 12px;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                        <span style="font-size: 32px;">🤖</span>
                        <div><strong>IA Vigilante</strong><br><span style="font-size: 12px; color: #888;">Monitoreo 24/7 de comportamientos</span></div>
                    </div>
                    <div style="font-size: 13px; line-height: 1.6;">
                        <p>✅ Detección de patrones sospechosos en tiempo real.</p>
                        <p>✅ Bloqueo automático de usuarios con comportamiento anómalo.</p>
                        <p>✅ Auditoría completa de todos los accesos y acciones.</p>
                        <p>✅ Alertas inmediatas ante cualquier intento de violación de seguridad.</p>
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderCurrentPage() {
        if (currentPage === 'dashboard') renderDashboard();
        else if (currentPage === 'apps') renderApps();
        else if (currentPage === 'users') renderUsers();
        else if (currentPage === 'logs') renderLogs();
        else if (currentPage === 'alerts') renderAlerts();
        else if (currentPage === 'encryption') renderEncryption();
    }
    
    // ========== ACCIONES ==========
    function checkPermission(action) {
        if (currentRole === 'admin') return true;
        if (currentRole === 'auditor' && (action === 'view_logs' || action === 'view_alerts')) return true;
        if (currentRole === 'viewer' && (action === 'view_dashboard' || action === 'view_apps')) return true;
        
        const result = IA.analyzeAction(currentUser, 'permission_denied', action, `Intento de acceso no autorizado a ${action}`);
        return false;
    }
    
    async function login() {
        const username = document.getElementById('loginUser').value;
        const password = document.getElementById('loginPass').value;
        
        const user = AUTHORIZED_USERS.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user.username;
            currentRole = user.role;
            
            // Registrar acceso exitoso
            IA.addAuditLog(currentUser, 'login', 'system', 'Acceso exitoso', 'info');
            
            // Cargar datos
            apps = [...ECOSYSTEM_APPS];
            users = [...AUTHORIZED_USERS];
            
            // Inicializar UI
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('securityLevel').innerHTML = `🔒 Nivel ${user.role === 'admin' ? '3' : user.role === 'auditor' ? '2' : '1'}`;
            
            renderCurrentPage();
            IA.showToast(`✅ Bienvenido, ${user.name}. Rol: ${user.role.toUpperCase()}`);
        } else {
            IA.showToast('❌ Acceso denegado. Credenciales inválidas.', true);
            IA.addAuditLog(username || 'desconocido', 'login_failed', 'system', 'Intento de acceso fallido', 'warning');
        }
    }
    
    function logout() {
        IA.addAuditLog(currentUser, 'logout', 'system', 'Cierre de sesión', 'info');
        currentUser = null;
        currentRole = null;
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('loginUser').value = '';
        document.getElementById('loginPass').value = '';
    }
    
    function exportLogs() {
        if (!checkPermission('export_logs')) {
            IA.showToast('❌ No tienes permiso para exportar logs', true);
            return;
        }
        
        const data = JSON.stringify(auditLogs, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `pivot_audit_logs_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        IA.addAuditLog(currentUser, 'export_logs', 'system', 'Exportación de logs', 'info');
        IA.showToast('📥 Logs exportados');
    }
    
    function clearAlerts() {
        if (!checkPermission('clear_alerts')) {
            IA.showToast('❌ No tienes permiso para limpiar alertas', true);
            return;
        }
        alerts = alerts.filter(a => a.read);
        renderAlerts();
        IA.addAuditLog(currentUser, 'clear_alerts', 'system', 'Alertas limpiadas', 'info');
        IA.showToast('✅ Alertas limpiadas');
    }
    
    // ========== INICIALIZACIÓN ==========
    function init() {
        // Navegación
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                if (!checkPermission('navigate')) return;
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentPage = item.dataset.page;
                renderCurrentPage();
                if (window.innerWidth <= 768) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            });
        });
    }
    
    return {
        login,
        logout,
        exportLogs,
        clearAlerts,
        init
    };
})();

// Inicializar cuando el DOM esté listo
document.addEventListener('DOMContentLoaded', () => {
    PivotCloud.init();
});
</script>
</body>
</html>
