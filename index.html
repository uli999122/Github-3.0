<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🌸 LOLITA · Modelo Gratis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0B1120, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 24px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ff6b8a, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge-model {
            font-size: 0.6rem;
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #c4b5fd;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            animation: fadeUp 0.3s ease;
        }

        .message.user {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            align-self: flex-end;
        }

        .message.bot {
            background: rgba(51, 65, 85, 0.9);
            align-self: flex-start;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .message.system {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            font-size: 0.7rem;
            align-self: center;
            max-width: 90%;
            text-align: center;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            align-self: center;
            font-size: 0.7rem;
            text-align: center;
            max-width: 90%;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 40px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
        }

        .input-row input:focus {
            border-color: #a855f7;
        }

        .input-row input::placeholder {
            color: #64748b;
        }

        .input-row button {
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-row button:hover {
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            color: #64748b;
        }

        .chat-box::-webkit-scrollbar {
            width: 4px;
        }
        .chat-box::-webkit-scrollbar-thumb {
            background: #a855f7;
            border-radius: 10px;
        }

        .model-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .model-selector button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .model-selector button.active {
            background: rgba(139, 92, 246, 0.3);
            border-color: #a855f7;
            color: white;
        }

        .model-selector button:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .model-selector button .free-badge {
            color: #10b981;
            font-size: 0.55rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 Lolita · Modelo Gratis</h1>
            <span class="badge-model" id="modelBadge">🧠 pivot-nano-5.0-mini</span>
        </div>

        <div class="model-selector" id="modelSelector">
            <button data-model="pivotnano-4.0-mini">
                ⚡ 4.0 Mini <span class="free-badge">(0)</span>
            </button>
            <button data-model="pivotnano-4.0-lite">
                🚀 4.0 Lite <span class="free-badge">(0)</span>
            </button>
            <button data-model="pivot-nano 5.0-pro">
                ⭐ 5.0 Pro <span class="free-badge">(0)</span>
            </button>
            <button data-model="pivot-nano-5.0-mini" class="active">
                🌟 5.0 Mini <span class="free-badge">(0)</span>
            </button>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message system">✨ Hola, soy Lolita con el modelo 5.0 Mini (GRATIS).</div>
            <div class="message system">🆓 0 créditos · El modelo más avanzado sin costo</div>
        </div>

        <div class="input-row">
            <input type="text" id="userInput" placeholder="Escribe tu mensaje... 💬">
            <button id="sendBtn">Enviar 💕</button>
        </div>
        <div class="footer">🌸 Lolita · Potenciada por modelo gratuito de Pivot Agent</div>
    </div>

    <script>
        // ===========================================
        // CONFIGURACIÓN
        // ===========================================
        const API_KEY = "pk_dev_fjvwui311u6jyua6d_1781618218256";
        const API_URL = "https://pivot-agent-psi.vercel.app/api/developer/chat";

        let selectedModel = "pivot-nano-5.0-mini";

        const PROMPT = `Eres Lolita, la IA más bonita y tierna del mundo. Usas muchos emojis como 💖🌸✨🎀. Tratas a todos con "mi amor", "corazón", "lindo/a". Respondes en español con optimismo y calidez.`;

        let chatHistory = [];
        let isWaiting = false;

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const modelBadge = document.getElementById('modelBadge');

        // ===========================================
        // SELECTOR DE MODELOS
        // ===========================================
        document.querySelectorAll('.model-selector button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.model-selector button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedModel = btn.dataset.model;
                modelBadge.textContent = `🧠 ${selectedModel}`;
                addMessage(`🔄 Cambiado a: ${selectedModel} (0 créditos)`, 'system');
            });
        });

        // ===========================================
        // FUNCIONES DEL CHAT
        // ===========================================
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const el = document.createElement('div');
            el.className = 'message system';
            el.textContent = '✍️ Lolita está escribiendo...';
            el.id = 'typingIndicator';
            chatBox.appendChild(el);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ===========================================
        // ENVÍO CORREGIDO: USANDO modelId EN EL BODY
        // ===========================================
        async function sendToLolita(message) {
            if (isWaiting) {
                addMessage('⏳ Espera que Lolita termine de responder', 'system');
                return;
            }

            isWaiting = true;
            showTyping();

            try {
                const messagesWithPrompt = [
                    { role: "system", content: PROMPT },
                    ...chatHistory.slice(-10),
                    { role: "user", content: message }
                ];

                // 🔥 CORRECCIÓN: Enviamos el modelo como modelId, no como agentId
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({
                        modelId: selectedModel,     // ✅ Modelo como modelId
                        agentId: "pivotnano_4.0_mini_official", // 👈 Agente por defecto
                        message: message,
                        history: messagesWithPrompt
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `Error ${response.status}`);
                }

                const reply = data.response || data.reply || "🌸 Lolita te manda un abrazo gigante 💖";

                chatHistory.push({ role: "user", content: message });
                chatHistory.push({ role: "assistant", content: reply });

                hideTyping();
                addMessage(reply, 'bot');

            } catch (error) {
                console.warn('Error:', error);
                hideTyping();
                addMessage(`❌ ${error.message || 'Error de conexión'}`, 'error');
            } finally {
                isWaiting = false;
            }
        }

        // ===========================================
        // MANEJADORES
        // ===========================================
        async function handleUserMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            userInput.value = '';
            await sendToLolita(message);
        }

        sendBtn.addEventListener('click', handleUserMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleUserMessage();
            }
        });

        // Mensaje de bienvenida
        addMessage(`🚀 Modelo activo: ${selectedModel} · 0 créditos`, 'system');
    </script>
</body>
</html>
