<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepoStudio 3D - Editor HTML con consola y comunidad</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-orange: #d2991d;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --glass-bg: rgba(22, 27, 34, 0.85);
            --glass-border: rgba(48, 54, 61, 0.6);
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        .app-container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        /* Header */
        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
        .header h1 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .btn:hover {
            border-color: var(--accent);
            background: #1c2533;
        }
        .btn-primary {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #000;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #35a044;
            border-color: #35a044;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 0.72rem;
            border-radius: 6px;
        }

        /* Main layout */
        .main-content {
            display: flex;
            flex: 1;
            gap: 12px;
            padding: 12px;
            overflow: hidden;
            min-height: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }
        .sidebar-box {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .sidebar-box.projects-box {
            flex: 2;
            min-height: 0;
        }
        .sidebar-box.ideas-box {
            flex: 1;
            min-height: 120px;
        }
        .box-header {
            padding: 11px 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .box-header .count-badge {
            background: var(--border);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
        }
        .project-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }
        .project-card {
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 7px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
            position: relative;
            font-size: 0.82rem;
        }
        .project-card:hover {
            border-color: var(--border);
            background: rgba(255, 255, 255, 0.04);
        }
        .project-card.active {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.08);
        }
        .project-card .name {
            font-weight: 600;
            margin-bottom: 2px;
        }
        .project-card .meta {
            font-size: 0.68rem;
            color: var(--text-secondary);
        }
        .project-card .delete-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: var(--accent-red);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .project-card:hover .delete-btn {
            opacity: 1;
        }
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 30px 16px;
            font-size: 0.8rem;
        }
        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
        }

        /* Ideas de comunidad */
        .ideas-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-size: 0.75rem;
        }
        .idea-item {
            padding: 8px 10px;
            margin-bottom: 4px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid var(--accent-purple);
            cursor: pointer;
            transition: all 0.2s;
        }
        .idea-item:hover {
            background: rgba(188, 140, 255, 0.06);
            border-left-color: var(--accent);
        }
        .idea-item .idea-author {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .idea-form {
            display: flex;
            gap: 6px;
            padding: 8px;
            border-top: 1px solid var(--border);
        }
        .idea-form input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--text);
            font-size: 0.75rem;
            outline: none;
            min-width: 0;
        }
        .idea-form input:focus {
            border-color: var(--accent);
        }
        .idea-form button {
            flex-shrink: 0;
        }

        /* Panel central: editor */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 0;
        }
        .panel-box {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .panel-box.editor-box {
            flex: 1;
        }
        .panel-box.preview-box {
            flex: 1;
        }
        .panel-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .panel-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.html {
            background: #e34c26;
        }
        .dot.preview {
            background: var(--accent-green);
        }
        .dot.console {
            background: var(--accent-orange);
        }

        /* Indicadores de estado */
        .status-indicators {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }
        .status-item.warning {
            color: var(--accent-orange);
        }
        .status-item.error {
            color: var(--accent-red);
        }
        .status-item.ok {
            color: var(--accent-green);
        }
        .validation-badge {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .validation-badge.valid {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(63, 185, 80, 0.3);
        }
        .validation-badge.warnings {
            background: rgba(210, 153, 29, 0.15);
            color: var(--accent-orange);
            border: 1px solid rgba(210, 153, 29, 0.3);
            animation: pulse-warning 2s infinite;
        }
        .validation-badge.errors {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(248, 81, 73, 0.3);
            animation: pulse-error 1.5s infinite;
        }
        @keyframes pulse-warning {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }
        @keyframes pulse-error {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Editor de código */
        .editor-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            min-height: 0;
        }
        .line-numbers {
            width: 50px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.25);
            padding: 14px 0;
            text-align: right;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.82rem;
            color: var(--text-secondary);
            overflow: hidden;
            user-select: none;
            line-height: 1.65;
            white-space: pre;
            border-right: 1px solid var(--border);
        }
        .code-editor {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            background: transparent;
            color: var(--text);
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.82rem;
            padding: 14px 16px;
            line-height: 1.65;
            outline: none;
            tab-size: 2;
            min-height: 0;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }
        .code-editor::placeholder {
            color: var(--text-secondary);
            opacity: 0.4;
        }

        /* Vista previa */
        .preview-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: #fff;
            min-height: 0;
        }

        /* Consola */
        .console-box {
            height: 150px;
            flex-shrink: 0;
        }
        .console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.72rem;
            line-height: 1.5;
            min-height: 0;
            background: rgba(0, 0, 0, 0.3);
        }
        .console-line {
            padding: 2px 0;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .console-line .timestamp {
            color: var(--text-secondary);
            opacity: 0.6;
            flex-shrink: 0;
            font-size: 0.65rem;
            min-width: 75px;
        }
        .console-line.error-line {
            color: var(--accent-red);
        }
        .console-line.warn-line {
            color: var(--accent-orange);
        }
        .console-line.info-line {
            color: var(--accent);
        }
        .console-line.success-line {
            color: var(--accent-green);
        }
        .console-empty {
            color: var(--text-secondary);
            opacity: 0.5;
            font-style: italic;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .modal input,
        .modal textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            margin-bottom: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal input:focus,
        .modal textarea:focus {
            border-color: var(--accent);
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-green);
            color: #000;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
                padding: 6px;
                gap: 6px;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                gap: 6px;
            }
            .sidebar-box {
                flex: 1;
                min-width: 0;
            }
            .sidebar-box.projects-box {
                flex: 1;
            }
            .sidebar-box.ideas-box {
                flex: 1;
                min-height: auto;
            }
            .console-box {
                height: 120px;
            }
            .header {
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">⏣</div>
                <h1>RepoStudio 3D</h1>
                <span class="validation-badge valid" id="validationBadge">✓ VÁLIDO</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-sm" onclick="clearConsole()" title="Limpiar consola">🧹 Consola</button>
                <button class="btn btn-primary" onclick="openModal()">+ Nuevo proyecto</button>
            </div>
        </header>

        <!-- Main -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <!-- Proyectos -->
                <div class="sidebar-box projects-box">
                    <div class="box-header">
                        📁 Proyectos
                        <span class="count-badge" id="projectCount">0</span>
                    </div>
                    <div class="project-list" id="projectList">
                        <div class="empty-state">
                            <span class="icon">📭</span>
                            <p>Aún no hay proyectos</p>
                        </div>
                    </div>
                </div>
                <!-- Ideas de la comunidad -->
                <div class="sidebar-box ideas-box">
                    <div class="box-header">
                        💡 Ideas comunidad
                        <span class="count-badge" id="ideasCount">0</span>
                    </div>
                    <div class="ideas-list" id="ideasList">
                        <div class="empty-state" style="padding:16px;">
                            <span class="icon" style="font-size:1.4rem;">💭</span>
                            <p style="font-size:0.72rem;">Sé el primero en sugerir</p>
                        </div>
                    </div>
                    <div class="idea-form">
                        <input type="text" id="ideaInput" placeholder="Añade una idea..." maxlength="150"
                        onkeydown="if(event.key==='Enter')addIdea()">
                        <button class="btn btn-sm btn-primary" onclick="addIdea()">Enviar</button>
                    </div>
                </div>
            </aside>

            <!-- Editor + Preview + Consola -->
            <div class="editor-panel">
                <!-- Editor -->
                <div class="panel-box editor-box">
                    <div class="panel-header">
                        <div class="panel-header-left">
                            <span class="dot html"></span> Editor HTML
                        </div>
                        <div class="status-indicators">
                            <span class="status-item ok" id="linesCount">📄 Líneas: 0</span>
                            <span class="status-item" id="charsCount">📝 Caracteres: 0</span>
                            <span class="status-item" id="tagsStatus">🔖 Tags: 0</span>
                        </div>
                    </div>
                    <div class="editor-wrapper">
                        <div class="line-numbers" id="lineNumbers">1</div>
                        <textarea
                        class="code-editor"
                        id="codeEditor"
                        placeholder="<!-- Pega tu código HTML aquí -->"
                        spellcheck="false"
                    ></textarea>
                </div>
            </div>

            <!-- Preview -->
            <div class="panel-box preview-box">
                <div class="panel-header">
                    <div class="panel-header-left">
                        <span class="dot preview"></span> Vista previa en vivo
                    </div>
                </div>
                <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>

            <!-- Consola -->
            <div class="panel-box console-box">
                <div class="panel-header">
                    <div class="panel-header-left">
                        <span class="dot console"></span> Consola de validación
                    </div>
                    <span class="status-item" id="consoleErrorCount" style="font-size:0.7rem;">Errores: 0 | Warnings: 0</span>
                </div>
                <div class="console-output" id="consoleOutput">
                    <div class="console-empty">✨ Consola lista. Escribe HTML para validar...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Nuevo Proyecto -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>✨ Nuevo proyecto</h2>
        <input type="text" id="projectName" placeholder="Nombre del proyecto" maxlength="50">
        <textarea id="projectDesc" placeholder="Descripción (opcional)" rows="3" maxlength="200"></textarea>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="createProject()">Crear proyecto</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Three.js -->
<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 20);

    scene.add(new THREE.AmbientLight(0x303050, 2));
    const pl1 = new THREE.PointLight(0x58a6ff, 45, 40);
    pl1.position.set(8, 5, 5);
    scene.add(pl1);
    const pl2 = new THREE.PointLight(0x3fb950, 30, 35);
    pl2.position.set(-6, -3, -4);
    scene.add(pl2);
    const pl3 = new THREE.PointLight(0xd2991d, 25, 30);
    pl3.position.set(2, -6, 8);
    scene.add(pl3);

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    const sphere = new THREE.Mesh(
        new THREE.IcosahedronGeometry(2.8, 3),
        new THREE.MeshPhysicalMaterial({ color: 0x1a2332, metalness: 0.4, roughness: 0.2, clearcoat: 0.3,
            clearcoatRoughness: 0.4 })
    );
    mainGroup.add(sphere);
    const wireS = new THREE.Mesh(
        new THREE.IcosahedronGeometry(2.95, 3),
        new THREE.MeshBasicMaterial({ color: 0x58a6ff, wireframe: true, transparent: true, opacity: 0.12 })
    );
    mainGroup.add(wireS);

    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(4.2, 0.03, 16, 120),
        new THREE.MeshStandardMaterial({ color: 0x58a6ff, emissive: 0x58a6ff, emissiveIntensity: 0.5, roughness: 0.3,
            metalness: 0.8 })
    );
    ring.rotation.set(Math.PI / 3, Math.PI / 6, 0);
    mainGroup.add(ring);

    const ring2 = new THREE.Mesh(
        new THREE.TorusGeometry(4.7, 0.025, 16, 100),
        new THREE.MeshStandardMaterial({ color: 0x3fb950, emissive: 0x3fb950, emissiveIntensity: 0.4, roughness: 0.3,
            metalness: 0.7 })
    );
    ring2.rotation.set(-Math.PI / 4, -Math.PI / 5, 0);
    mainGroup.add(ring2);

    const pCount = 350;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    const pCol = new Float32Array(pCount * 3);
    const palette = [0x58a6ff, 0x3fb950, 0xd2991d, 0xf85149, 0xbc8cff].map(c => new THREE.Color(c));
    for (let i = 0; i < pCount; i++) {
        const th = Math.random() * Math.PI * 2,
            ph = Math.random() * Math.PI * 2,
            r = 5 + Math.random() * 12;
        pPos[i * 3] = Math.cos(th) * Math.sin(ph) * r;
        pPos[i * 3 + 1] = Math.sin(th) * Math.sin(ph) * r;
        pPos[i * 3 + 2] = Math.cos(ph) * r;
        const c = palette[Math.floor(Math.random() * palette.length)];
        pCol[i * 3] = c.r;
        pCol[i * 3 + 1] = c.g;
        pCol[i * 3 + 2] = c.b;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.045, vertexColors: true,
        blending: THREE.AdditiveBlending, depthWrite: false, transparent: true, opacity: 0.7 }));
    scene.add(particles);

    const cubesGroup = new THREE.Group();
    for (let i = 0; i < 18; i++) {
        const s = 0.1 + Math.random() * 0.25;
        const cube = new THREE.Mesh(
            new THREE.BoxGeometry(s, s, s),
            new THREE.MeshStandardMaterial({ color: palette[Math.floor(Math.random() * palette.length)],
                roughness: 0.3, metalness: 0.6, emissive: palette[Math.floor(Math.random() * palette.length)],
                emissiveIntensity: 0.3 })
        );
        cube.position.set((Math.random() - 0.5) * 14, (Math.random() - 0.5) * 14, (Math.random() - 0.5) * 10);
        cube.userData = { speed: 0.002 + Math.random() * 0.008, axis: new THREE.Vector3(Math.random() - 0.5, Math
                .random() - 0.5, Math.random() - 0.5).normalize(), fs: 0.3 + Math.random() * 0.7, fa: 0.5 + Math
                .random() * 1.5, iY: cube.position.y };
        cubesGroup.add(cube);
    }
    scene.add(cubesGroup);

    const mouse = { x: 0, y: 0 },
        target = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => { target.x = (e.clientX / window.innerWidth) * 2 - 1;
        target.y = -(e.clientY / window.innerHeight) * 2 + 1; });
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight); });

    const clock = new THREE.Clock();
    (function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.1),
            t = performance.now() * 0.001;
        mouse.x += (target.x - mouse.x) * 0.03;
        mouse.y += (target.y - mouse.y) * 0.03;
        mainGroup.rotation.y += dt * 0.12;
        mainGroup.position.x += (mouse.x * 1.5 - mainGroup.position.x) * 0.02;
        mainGroup.position.y += (mouse.y * 0.8 - mainGroup.position.y) * 0.02;
        ring.rotation.z += dt * 0.22;
        ring2.rotation.z -= dt * 0.18;
        particles.rotation.y += dt * 0.03;
        particles.rotation.x += dt * 0.015;
        cubesGroup.children.forEach(c => { c.rotateOnWorldAxis(c.userData.axis, c.userData.speed);
            c.position.y = c.userData.iY + Math.sin(t * c.userData.fs) * c.userData.fa; });
        pl1.intensity = 42 + Math.sin(t * 0.8) * 6;
        pl2.intensity = 26 + Math.cos(t * 1.1) * 5;
        renderer.render(scene, camera);
    })();

    console.log('🎨 Escena 3D lista');
</script>

<!-- LÓGICA DE LA APLICACIÓN -->
<script>
    // ==================== SISTEMA DE IDEAS ====================
    const IDEAS_STORAGE = 'repostudio3d_ideas';

    function getIdeas() {
        try { return JSON.parse(localStorage.getItem(IDEAS_STORAGE)) || []; } catch { return []; }
    }

    function saveIdeas(ideas) { localStorage.setItem(IDEAS_STORAGE, JSON.stringify(ideas)); }

    function addIdea() {
        const input = document.getElementById('ideaInput');
        const text = input.value.trim();
        if (!text) return;

        const ideas = getIdeas();
        const names = ['DevCreativo', 'FrontendNinja', 'PixelArtist', 'CodeWizard', 'UX_Dreamer', 'WebExplorer',
            'ScriptJedi', 'LayoutKing', 'DebugHacker', 'CSS_Master'
        ];
        ideas.unshift({
            id: Date.now(),
            text: text,
            author: names[Math.floor(Math.random() * names.length)],
            time: Date.now(),
            likes: Math.floor(Math.random() * 15)
        });
        if (ideas.length > 50) ideas.pop();
        saveIdeas(ideas);
        input.value = '';
        renderIdeas();
        logToConsole('info', `💡 Nueva idea añadida: "${text}"`);
        showToast('💡 Idea publicada');
    }

    function useIdea(text) {
        const editor = document.getElementById('codeEditor');
        const current = editor.value;
        const ideaComment = `<!-- 💡 Idea de la comunidad: ${text} -->\n`;
        if (current.trim()) {
            editor.value = current + '\n' + ideaComment;
        } else {
            editor.value = ideaComment +
                '<!DOCTYPE html>\n<html>\n<head><title>Demo</title></head>\n<body>\n  \n</body>\n</html>';
        }
        editor.focus();
        updateAll();
        logToConsole('info', `📋 Idea aplicada: "${text}"`);
        showToast('📋 Idea pegada en el editor');
    }

    function renderIdeas() {
        const ideas = getIdeas();
        const container = document.getElementById('ideasList');
        const countEl = document.getElementById('ideasCount');
        countEl.textContent = ideas.length;

        if (ideas.length === 0) {
            container.innerHTML =
                '<div class="empty-state" style="padding:16px;"><span class="icon" style="font-size:1.4rem;">💭</span><p style="font-size:0.72rem;">Sé el primero en sugerir</p></div>';
            return;
        }
        container.innerHTML = ideas.map(i => `
                <div class="idea-item" onclick="useIdea('${escapeHtmlAttr(i.text)}')" title="Click para usar esta idea">
                    💬 ${escapeHtml(i.text)}
                    <div class="idea-author">👤 ${escapeHtml(i.author)} · 👍 ${i.likes} · ${timeAgo(i.time)}</div>
                </div>
            `).join('');
    }

    // ==================== CONSOLA DE VALIDACIÓN ====================
    const consoleLog = [];

    function logToConsole(type, message) {
        const now = new Date();
        const time = now.toLocaleTimeString('es-CO', { hour12: false });
        consoleLog.push({ type, message, time, timestamp: now.getTime() });
        if (consoleLog.length > 100) consoleLog.shift();
        renderConsole();
    }

    function clearConsole() {
        consoleLog.length = 0;
        renderConsole();
        logToConsole('info', '🧹 Consola limpiada');
    }

    function renderConsole() {
        const output = document.getElementById('consoleOutput');
        const errorCountEl = document.getElementById('consoleErrorCount');
        const errors = consoleLog.filter(l => l.type === 'error').length;
        const warnings = consoleLog.filter(l => l.type === 'warn').length;

        errorCountEl.textContent = `Errores: ${errors} | Warnings: ${warnings}`;

        if (consoleLog.length === 0) {
            output.innerHTML = '<div class="console-empty">✨ Consola lista. Escribe HTML para validar...</div>';
            return;
        }
        output.innerHTML = consoleLog.map(l => {
            const cls = l.type === 'error' ? 'error-line' : l.type === 'warn' ? 'warn-line' : l.type ===
                'success' ? 'success-line' : 'info-line';
            return `<div class="console-line ${cls}"><span class="timestamp">[${l.time}]</span><span>${l.message}</span></div>`;
        }).join('');
        output.scrollTop = output.scrollHeight;
    }

    // ==================== VALIDADOR HTML ====================
    function validateHTML(code) {
        const issues = [];
        const warnings = [];

        // Detectar tags sin cerrar (validación básica)
        const tagRegex = /<\/?([a-zA-Z][a-zA-Z0-9]*)\b[^>]*>/g;
        const openTags = [];
        const allTags = [];
        let match;
        while ((match = tagRegex.exec(code)) !== null) {
            const fullTag = match[0];
            const tagName = match[1].toLowerCase();
            const isSelfClosing = fullTag.endsWith('/>');
            const isClosing = fullTag.startsWith('</');
            const voidElements = ['br', 'hr', 'img', 'input', 'meta', 'link', 'area', 'base', 'col', 'embed',
                'source', 'track', 'wbr'
            ];

            allTags.push({ name: tagName, full: fullTag, isClosing, isSelfClosing, index: match.index });

            if (!isClosing && !isSelfClosing && !voidElements.includes(tagName)) {
                openTags.push({ name: tagName, index: match.index });
            }
            if (isClosing && !voidElements.includes(tagName)) {
                if (openTags.length > 0 && openTags[openTags.length - 1].name === tagName) {
                    openTags.pop();
                } else if (openTags.length > 0) {
                    issues.push(
                        `⚠️ Tag <strong>&lt;/${tagName}&gt;</strong> no coincide. Se esperaba &lt;/${openTags[openTags.length-1].name}&gt; en línea cercana a posición ${match.index}`
                        );
                }
            }
        }
        openTags.forEach(t => {
            issues.push(
                `❌ Tag <strong>&lt;${t.name}&gt;</strong> no tiene su cierre &lt;/${t.name}&gt; (abierto cerca de posición ${t.index})`);
        });

        // Validar estructura básica
        const hasDoctype = /<!DOCTYPE\s+html/i.test(code);
        const hasHtmlTag = /<html[\s>]/i.test(code) && /<\/html>/i.test(code);
        const hasHeadTag = /<head[\s>]/i.test(code) && /<\/head>/i.test(code);
        const hasBodyTag = /<body[\s>]/i.test(code) && /<\/body>/i.test(code);
        const hasTitleTag = /<title[\s>]/i.test(code) && /<\/title>/i.test(code);

        if (!hasDoctype && code.trim().length > 0) {
            warnings.push('💡 Falta <!DOCTYPE html> al inicio del documento');
        }
        if (!hasHtmlTag && code.trim().length > 20) {
            warnings.push('💡 Se recomienda usar etiquetas &lt;html&gt; para estructura completa');
        }
        if (!hasHeadTag && hasHtmlTag) {
            warnings.push('💡 Falta la sección &lt;head&gt; dentro de &lt;html&gt;');
        }
        if (!hasBodyTag && hasHtmlTag) {
            warnings.push('💡 Falta la sección &lt;body&gt; dentro de &lt;html&gt;');
        }
        if (hasHeadTag && !hasTitleTag) {
            warnings.push('💡 Añade un &lt;title&gt; dentro de &lt;head&gt; para mejor SEO');
        }

        // Contar tags
        const tagCount = allTags.filter(t => !t.isClosing).length;

        return { issues: [...issues, ...warnings], errors: issues.filter(i => i.startsWith('❌')).length,
            warningsCount: warnings.length + issues.filter(i => i.startsWith('⚠️')).length,
            totalIssues: issues.length + warnings.length, tagCount };
    }

    function updateValidation() {
        const code = document.getElementById('codeEditor').value;
        const validation = validateHTML(code);
        const badge = document.getElementById('validationBadge');
        const consoleOutput = document.getElementById('consoleOutput');

        // Limpiar logs de validación anteriores
        const nonValidationLogs = consoleLog.filter(l => !l._validation);
        const newLogs = [];

        if (validation.errors > 0) {
            badge.textContent = `❌ ${validation.errors} ERRORES`;
            badge.className = 'validation-badge errors';
        } else if (validation.warningsCount > 0) {
            badge.textContent = `⚠️ ${validation.warningsCount} WARNINGS`;
            badge.className = 'validation-badge warnings';
        } else if (code.trim().length > 0) {
            badge.textContent = '✓ VÁLIDO';
            badge.className = 'validation-badge valid';
        } else {
            badge.textContent = '○ SIN CÓDIGO';
            badge.className = 'validation-badge';
        }

        validation.issues.forEach(issue => {
            const type = issue.startsWith('❌') ? 'error' : 'warn';
            newLogs.push({ type, message: issue, time: new Date().toLocaleTimeString('es-CO', { hour12: false }),
                timestamp: Date.now(), _validation: true });
        });

        if (code.trim().length > 0 && validation.totalIssues === 0) {
            newLogs.push({
                type: 'success',
                message: '✅ HTML válido - No se detectaron errores',
                time: new Date().toLocaleTimeString('es-CO', { hour12: false }),
                timestamp: Date.now(),
                _validation: true
            });
        }

        // Reconstruir consola
        consoleLog.length = 0;
        consoleLog.push(...nonValidationLogs, ...newLogs);
        if (consoleLog.length > 100) consoleLog.splice(0, consoleLog.length - 100);
        renderConsole();
    }

    // ==================== CONTADORES ====================
    function updateCounters() {
        const code = document.getElementById('codeEditor').value;
        const lines = code.split('\n').length;
        const chars = code.length;
        const validation = validateHTML(code);
        const tagCount = validation.tagCount;

        document.getElementById('linesCount').textContent = `📄 Líneas: ${lines}`;
        document.getElementById('charsCount').textContent = `📝 Caracteres: ${chars}`;
        document.getElementById('tagsStatus').textContent = `🔖 Tags: ${tagCount}`;

        // Actualizar números de línea
        const lineNumbers = document.getElementById('lineNumbers');
        lineNumbers.innerHTML = Array.from({ length: Math.max(lines, 1) }, (_, i) => i + 1).join('\n');
    }

    // ==================== PROYECTOS ====================
    const STORAGE_KEY = 'repostudio3d_projects';
    const ACTIVE_KEY = 'repostudio3d_active';

    function getProjects() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }

    function saveProjects(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

    function getActiveId() { return localStorage.getItem(ACTIVE_KEY) || null; }

    function setActiveId(id) { localStorage.setItem(ACTIVE_KEY, id); }

    function generateId() { return 'proj_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

    function updateAll() {
        updatePreview();
        updateCounters();
        updateValidation();
        saveCurrentProject();
    }

    let updateTimer;

    function updatePreview() {
        clearTimeout(updateTimer);
        updateTimer = setTimeout(() => {
            const code = document.getElementById('codeEditor').value;
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const frame = document.getElementById('previewFrame');
            frame.src = url;
            frame.onload = () => URL.revokeObjectURL(url);
        }, 250);
    }

    function renderProjectList() {
        const projects = getProjects();
        const activeId = getActiveId();
        const container = document.getElementById('projectList');
        document.getElementById('projectCount').textContent = projects.length;

        if (projects.length === 0) {
            container.innerHTML =
                '<div class="empty-state"><span class="icon">📭</span><p>Aún no hay proyectos</p></div>';
            return;
        }
        container.innerHTML = projects.map(p => `
                <div class="project-card ${p.id===activeId?'active':''}" onclick="selectProject('${p.id}')">
                    <div class="name">📄 ${escapeHtml(p.name)}</div>
                    <div class="meta">${escapeHtml(p.desc||'Sin descripción')} · ${timeAgo(p.updatedAt)}</div>
                    <button class="delete-btn" onclick="event.stopPropagation();deleteProject('${p.id}')" title="Eliminar">🗑</button>
                </div>`).join('');
    }

    function selectProject(id) {
        const p = getProjects().find(x => x.id === id);
        if (!p) return;
        setActiveId(id);
        document.getElementById('codeEditor').value = p.code || '';
        updateAll();
        renderProjectList();
        logToConsole('info', `📂 Proyecto abierto: "${p.name}"`);
    }

    function loadActiveProject() {
        const activeId = getActiveId();
        if (!activeId) return;
        const p = getProjects().find(x => x.id === activeId);
        document.getElementById('codeEditor').value = p ? (p.code || '') : '';
        updateAll();
    }

    function saveCurrentProject() {
        const activeId = getActiveId();
        if (!activeId) return;
        const projects = getProjects();
        const idx = projects.findIndex(x => x.id === activeId);
        if (idx === -1) return;
        projects[idx].code = document.getElementById('codeEditor').value;
        projects[idx].updatedAt = Date.now();
        saveProjects(projects);
    }

    function createProject() {
        const name = document.getElementById('projectName').value.trim();
        if (!name) { showToast('⚠️ El nombre es obligatorio');
            document.getElementById('projectName').focus(); return; }
        const np = { id: generateId(), name, desc: document.getElementById('projectDesc').value.trim(), code: '',
            createdAt: Date.now(), updatedAt: Date.now() };
        const projects = getProjects();
        projects.unshift(np);
        saveProjects(projects);
        setActiveId(np.id);
        document.getElementById('projectName').value = '';
        document.getElementById('projectDesc').value = '';
        closeModal();
        renderProjectList();
        selectProject(np.id);
        logToConsole('success', `✅ Proyecto creado: "${np.name}"`);
        showToast('✅ Proyecto creado');
    }

    function deleteProject(id) {
        if (!confirm('¿Eliminar este proyecto?')) return;
        const name = getProjects().find(p => p.id === id)?.name || '';
        let projects = getProjects().filter(p => p.id !== id);
        saveProjects(projects);
        const activeId = getActiveId();
        if (activeId === id) {
            if (projects.length > 0) { setActiveId(projects[0].id);
                selectProject(projects[0].id); } else { localStorage.removeItem(ACTIVE_KEY);
                document.getElementById('codeEditor').value = '';
                updateAll(); }
        }
        renderProjectList();
        logToConsole('warn', `🗑 Proyecto eliminado: "${name}"`);
        showToast('🗑 Proyecto eliminado');
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('show');
        document.getElementById('projectName').focus(); }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('show');
        document.getElementById('projectName').value = '';
        document.getElementById('projectDesc').value = ''; }

    function showToast(msg, d = 2000) { const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove('show'), d); }

    function escapeHtml(text) { const d = document.createElement('div');
        d.textContent = text; return d.innerHTML; }

    function escapeHtmlAttr(text) { return text.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;'); }

    function timeAgo(ts) { const diff = Date.now() - ts; const s = Math.floor(diff / 1000); const m = Math.floor(s /
            60); const h = Math.floor(m / 60); const d = Math.floor(h / 24); if (d > 0) return `hace ${d}d`; if (h >
            0) return `hace ${h}h`; if (m > 0) return `hace ${m}m`; return 'ahora'; }

    // Eventos
    document.getElementById('codeEditor').addEventListener('input', updateAll);
    document.getElementById('codeEditor').addEventListener('scroll', function() {
        document.getElementById('lineNumbers').scrollTop = this.scrollTop;
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeModal();
        if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault();
            saveCurrentProject();
            showToast('💾 Guardado');
            logToConsole('success', '💾 Proyecto guardado'); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault();
            openModal(); }
    });
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document
            .getElementById('modalOverlay')) closeModal(); });

    // Exponer
    window.selectProject = selectProject;
    window.deleteProject = deleteProject;
    window.createProject = createProject;
    window.openModal = openModal;
    window.closeModal = closeModal;
    window.addIdea = addIdea;
    window.clearConsole = clearConsole;
    window.useIdea = useIdea;

    // Init
    function init() {
        renderProjectList();
        renderIdeas();
        loadActiveProject();
        updateAll();
        const activeId = getActiveId();
        const projects = getProjects();
        if (!activeId && projects.length > 0) {
            setActiveId(projects[0].id);
            selectProject(projects[0].id);
        }
        logToConsole('info', '🚀 RepoStudio 3D iniciado');
        logToConsole('info', '💡 Panel de ideas listo - comparte sugerencias');
        console.log('🚀 RepoStudio 3D listo | Ctrl+S guarda | Ctrl+N nuevo proyecto');
    }
    init();
</script>
