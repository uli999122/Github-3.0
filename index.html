<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pivot AI">
    <title>Pivot AI - Asistente con Cloud</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0f;--surface:#12121a;--primary:#6366f1;--primary-light:#818cf8;--text:#f1f5f9;--text-secondary:#94a3b8;--border:rgba(255,255,255,0.06);--success:#10b981;--error:#ef4444}
        body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);height:100vh;overflow:hidden;position:fixed;width:100%}
        .app{display:flex;flex-direction:column;height:100vh;max-width:48rem;margin:0 auto;position:relative;z-index:1}
        .header{padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);flex-shrink:0}
        .logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;background-clip:text;color:transparent}
        .controls{display:flex;align-items:center;gap:0.5rem}
        .control-btn{width:2.2rem;height:2.2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);cursor:pointer;border:1px solid var(--border);color:var(--text-secondary)}
        .control-btn:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .user-info{display:flex;align-items:center;gap:0.5rem;background:rgba(99,102,241,0.1);padding:0.3rem 0.8rem;border-radius:2rem}
        .user-email{font-size:0.75rem;color:var(--primary-light)}
        .chat-area{flex:1;overflow-y:auto;padding:1.5rem 1rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth}
        .mensaje{display:flex;gap:0.75rem;max-width:100%;animation:fadeIn 0.3s ease}
        .mensaje.usuario{justify-content:flex-end}
        .avatar{width:2rem;height:2rem;border-radius:0.5rem;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .burbuja{max-width:85%;padding:0.75rem 1rem;border-radius:1.2rem;font-size:0.9rem;line-height:1.5;word-wrap:break-word}
        .mensaje.usuario .burbuja{background:var(--primary);color:#fff;border-bottom-right-radius:0.25rem}
        .mensaje.bot .burbuja{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:0.25rem}
        .input-area{padding:0.75rem 1rem;border-top:1px solid var(--border);background:rgba(10,10,15,0.95);flex-shrink:0}
        .input-wrapper{display:flex;gap:0.5rem;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:1.75rem;padding:0.5rem 0.75rem}
        .input-wrapper textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:0.9rem;resize:none;font-family:inherit}
        .enviar-btn{width:2.2rem;height:2.2rem;border-radius:50%;background:var(--primary);color:#fff;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center}
        .sidebar{position:fixed;top:0;left:0;width:85%;max-width:20rem;height:100%;background:rgba(15,15,26,0.98);backdrop-filter:blur(40px);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform 0.3s;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
        .sidebar.abierta{transform:translateX(0)}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;opacity:0;pointer-events:none;transition:opacity 0.3s}
        .overlay.abierta{opacity:1;pointer-events:auto}
        .sidebar-section{padding:1rem;border-bottom:1px solid var(--border)}
        .chat-item{padding:0.7rem;border-radius:0.5rem;margin-bottom:0.25rem;cursor:pointer;font-size:0.8rem}
        .chat-item.activo{background:rgba(99,102,241,0.15);border-left:3px solid var(--primary)}
        .btn-nuevo-chat{width:100%;padding:0.7rem;background:var(--primary);border:none;border-radius:0.75rem;color:#fff;font-weight:600;cursor:pointer;margin-top:0.5rem}
        .toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:2rem;padding:0.5rem 1rem;font-size:0.8rem;z-index:200;opacity:0;transition:opacity 0.3s}
        .toast.visible{opacity:1}
        .typing{display:flex;gap:0.25rem;padding:0.7rem 1rem;background:var(--surface);border-radius:1.2rem;width:fit-content}
        .typing span{width:0.4rem;height:0.4rem;background:var(--primary-light);border-radius:50%;animation:typing 1.4s infinite}
        .typing span:nth-child(2){animation-delay:0.2s}
        .typing span:nth-child(3){animation-delay:0.4s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
        .modelo-selector{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.5rem}
        .modelo-chip{padding:0.3rem 0.7rem;border-radius:2rem;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:0.7rem}
        .modelo-chip.activo{background:var(--primary);color:#fff;border-color:transparent}
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="cerrarSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
                <div class="avatar" style="width:2.5rem;height:2.5rem"><i class="fa-solid fa-robot"></i></div>
                <div><strong>Pivot AI</strong><br><span id="userEmailDisplay" style="font-size:0.7rem;color:var(--text-secondary)">usuario@ejemplo.com</span></div>
            </div>
            <button class="btn-nuevo-chat" onclick="nuevoChat()"><i class="fa-solid fa-plus"></i> Nuevo chat</button>
        </div>
        <div class="sidebar-section">
            <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.5rem">HISTORIAL</div>
            <div id="listaChats"></div>
        </div>
        <div class="sidebar-section">
            <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.5rem">MOTOR IA</div>
            <div class="modelo-selector" id="modeloSelector"></div>
        </div>
    </div>

    <div class="app">
        <header class="header">
            <button class="control-btn" onclick="abrirSidebar()"><i class="fa-solid fa-bars"></i></button>
            <span class="logo">PIVOT AI</span>
            <div class="controls">
                <div class="user-info"><i class="fa-regular fa-user"></i><span class="user-email" id="userEmail">cargando...</span></div>
                <button class="control-btn" onclick="mostrarLogin()"><i class="fa-regular fa-circle-user"></i></button>
            </div>
        </header>

        <div class="chat-area" id="chatArea"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="inputUsuario" rows="1" placeholder="Escribe un mensaje..."></textarea>
                <button class="enviar-btn" id="enviarBtn"><i class="fa-solid fa-arrow-up"></i></button>
            </div>
        </div>
    </div>

    <div class="toast" id="toastEl"></div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        const CLOUD_URL = 'https://pivot-cloud.vercel.app';
        
        // Modelos IA
        const MODELOS = {
            veloz: { nombre: '⚡ Veloz', modelo: 'llama-3.3-70b-versatile', proveedor: 'groq' },
            vision: { nombre: '👁️ Visión', modelo: 'llama-3.2-11b-vision-preview', proveedor: 'groq' },
            profundo: { nombre: '🔍 Profundo', modelo: 'deepseek-r1-distill-llama-70b', proveedor: 'groq' }
        };

        // Estado global
        let usuarioActual = null;
        let chatActivoId = null;
        let chats = [];
        let modeloActual = 'veloz';
        let enviando = false;

        // ============================================
        // FUNCIONES DE USUARIO (Login simple)
        // ============================================
        function mostrarLogin() {
            const email = prompt('📧 Ingresa tu email para guardar tus chats:', localStorage.getItem('pivot_user_email') || 'usuario@ejemplo.com');
            if (email && email.includes('@')) {
                usuarioActual = { email, userId: btoa(email).replace(/=/g, '') };
                localStorage.setItem('pivot_user_email', email);
                document.getElementById('userEmail').innerText = email.split('@')[0];
                document.getElementById('userEmailDisplay').innerText = email;
                cargarChatsDesdeCloud();
            } else if (email) {
                alert('Email inválido');
            }
        }

        // ============================================
        // API CLOUD (Endpoint único /api/ai)
        // ============================================
        async function apiCloud(action, method, data = {}) {
            if (!usuarioActual) return null;
            const url = `${CLOUD_URL}/api/ai?action=${action}`;
            const options = {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: usuarioActual.userId, ...data })
            };
            try {
                const res = await fetch(url, options);
                const json = await res.json();
                if (json.success) return json;
                console.error('API error:', json);
                return null;
            } catch (e) {
                console.error('Fetch error:', e);
                return null;
            }
        }

        // Guardar chat actual en la nube
        async function guardarChatActual() {
            if (!chatActivoId || !usuarioActual) return;
            const chat = chats.find(c => c.id === chatActivoId);
            if (!chat) return;
            
            await apiCloud('save', 'POST', {
                chatId: chatActivoId,
                title: chat.titulo,
                messages: chat.mensajes,
                model: modeloActual,
                persona: 'default'
            });
        }

        // Cargar todos los chats del usuario
        async function cargarChatsDesdeCloud() {
            if (!usuarioActual) return;
            mostrarToast('🔄 Cargando tus chats...');
            const res = await apiCloud('list', 'GET', {});
            if (res && res.chats) {
                // Convertir formato cloud a local
                chats = res.chats.map(c => ({
                    id: c.chatId,
                    titulo: c.title,
                    mensajes: c.messages || [],
                    fecha: c.updatedAt
                }));
                if (chats.length === 0) {
                    nuevoChat();
                } else {
                    chatActivoId = chats[0].id;
                    renderListaChats();
                    cargarChatActivo();
                }
                mostrarToast(`✅ ${chats.length} chats cargados`);
            } else {
                // Si no hay chats en cloud, crear uno local
                if (chats.length === 0) nuevoChat();
            }
        }

        // Eliminar chat
        async function eliminarChatCloud(chatId) {
            if (!usuarioActual) return;
            await apiCloud('delete', 'DELETE', { chatId });
        }

        // ============================================
        // FUNCIONES LOCALES DE CHATS
        // ============================================
        function nuevoChat() {
            const id = Date.now().toString();
            chats.unshift({
                id: id,
                titulo: 'Nueva conversación',
                mensajes: [],
                fecha: new Date().toISOString()
            });
            chatActivoId = id;
            renderListaChats();
            cargarChatActivo();
            guardarChatActual();
            
            // Mensaje de bienvenida
            agregarMensaje(`✨ **Pivot AI con Cloud**\n\nTus chats se guardan automáticamente en la nube.\n\n💡 Escribe lo que quieras o prueba:\n• "Hola"\n• "¿Qué planes tienes?"\n• Sube una imagen para análisis`, false);
        }

        function cargarChatActivo() {
            const chat = chats.find(c => c.id === chatActivoId);
            if (!chat) return;
            
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            chat.mensajes.forEach(msg => {
                agregarMensajeDOM(msg.texto, msg.esUsuario, msg.razonamiento);
            });
            renderListaChats();
        }

        function renderListaChats() {
            const container = document.getElementById('listaChats');
            if (!container) return;
            container.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === chatActivoId ? 'activo' : ''}`;
                div.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(chat.titulo)}</span>`;
                div.onclick = () => {
                    if (chatActivoId === chat.id) return;
                    guardarChatActual();
                    chatActivoId = chat.id;
                    cargarChatActivo();
                    cerrarSidebar();
                };
                container.appendChild(div);
            });
        }

        function agregarMensaje(texto, esUsuario, razonamiento = null) {
            agregarMensajeDOM(texto, esUsuario, razonamiento);
            
            // Guardar en el chat actual
            const chat = chats.find(c => c.id === chatActivoId);
            if (chat) {
                chat.mensajes.push({ texto, esUsuario, razonamiento, fecha: new Date().toISOString() });
                if (chat.titulo === 'Nueva conversación' && esUsuario && texto.length > 3) {
                    chat.titulo = texto.substring(0, 30) + (texto.length > 30 ? '...' : '');
                    renderListaChats();
                }
                guardarChatActual();
            }
        }

        function agregarMensajeDOM(texto, esUsuario, razonamiento = null) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `mensaje ${esUsuario ? 'usuario' : 'bot'}`;
            
            let razHTML = '';
            if (razonamiento && razonamiento.length > 0) {
                razHTML = `<details style="margin-bottom:0.5rem;font-size:0.7rem;color:var(--text-secondary)"><summary>🧠 Pensamiento</summary><div style="margin-top:0.3rem;padding:0.5rem;background:rgba(0,0,0,0.2);border-radius:0.5rem">${escapeHtml(razonamiento)}</div></details>`;
            }
            
            div.innerHTML = `
                <div class="avatar">${esUsuario ? '<i class="fa-regular fa-user"></i>' : '<i class="fa-solid fa-robot"></i>'}</div>
                <div class="burbuja">${razHTML}${procesarRespuesta(texto)}</div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function procesarRespuesta(texto) {
            if (!texto) return '';
            // Convertir markdown básico
            let html = escapeHtml(texto);
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function mostrarEscribiendo() {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'mensaje bot';
            div.id = 'escribiendo';
            div.innerHTML = `<div class="avatar"><i class="fa-solid fa-robot"></i></div><div class="typing"><span></span><span></span><span></span></div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function ocultarEscribiendo() {
            const el = document.getElementById('escribiendo');
            if (el) el.remove();
        }

        function escapeHtml(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        function mostrarToast(msg) {
            const t = document.getElementById('toastEl');
            t.textContent = msg;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 2500);
        }

        // ============================================
        // GROQ API (respuesta real)
        // ============================================
        async function llamarGroq(mensajes) {
            const apiKey = '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';
            const modelo = MODELOS[modeloActual].modelo;
            
            const respuesta = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: modelo,
                    messages: [{ role: 'system', content: 'Eres Pivot AI, un asistente inteligente y útil. Responde en español de forma clara y amigable.' }, ...mensajes],
                    temperature: 0.7,
                    max_tokens: 1000
                })
            });
            
            if (!respuesta.ok) throw new Error('Error en Groq');
            const data = await respuesta.json();
            return data.choices[0].message.content;
        }

        async function enviarMensaje() {
            if (enviando) return;
            const input = document.getElementById('inputUsuario');
            const texto = input.value.trim();
            if (!texto) return;
            
            if (!usuarioActual) {
                mostrarToast('🔐 Primero inicia sesión con tu email');
                mostrarLogin();
                return;
            }
            
            input.value = '';
            enviando = true;
            
            agregarMensaje(texto, true);
            mostrarEscribiendo();
            
            try {
                const chat = chats.find(c => c.id === chatActivoId);
                const historial = chat ? chat.mensajes.slice(-10).map(m => ({ role: m.esUsuario ? 'user' : 'assistant', content: m.texto })) : [];
                historial.push({ role: 'user', content: texto });
                
                const respuesta = await llamarGroq(historial);
                ocultarEscribiendo();
                agregarMensaje(respuesta, false);
            } catch (error) {
                ocultarEscribiendo();
                agregarMensaje(`❌ Error: ${error.message}. Intenta de nuevo.`, false);
                console.error(error);
            } finally {
                enviando = false;
                document.getElementById('enviarBtn').disabled = false;
            }
        }

        // ============================================
        // MODELOS UI
        // ============================================
        function renderModelos() {
            const container = document.getElementById('modeloSelector');
            if (!container) return;
            container.innerHTML = '';
            for (const [key, modelo] of Object.entries(MODELOS)) {
                const chip = document.createElement('button');
                chip.className = `modelo-chip ${modeloActual === key ? 'activo' : ''}`;
                chip.innerHTML = modelo.nombre;
                chip.onclick = () => {
                    modeloActual = key;
                    renderModelos();
                    mostrarToast(`🧠 Cambiado a ${modelo.nombre}`);
                };
                container.appendChild(chip);
            }
        }

        // ============================================
        // SIDEBAR
        // ============================================
        function abrirSidebar() {
            document.getElementById('sidebar').classList.add('abierta');
            document.getElementById('overlay').classList.add('abierta');
        }
        function cerrarSidebar() {
            document.getElementById('sidebar').classList.remove('abierta');
            document.getElementById('overlay').classList.remove('abierta');
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        function init() {
            renderModelos();
            
            // Cargar usuario guardado
            const emailGuardado = localStorage.getItem('pivot_user_email');
            if (emailGuardado) {
                usuarioActual = { email: emailGuardado, userId: btoa(emailGuardado).replace(/=/g, '') };
                document.getElementById('userEmail').innerText = emailGuardado.split('@')[0];
                document.getElementById('userEmailDisplay').innerText = emailGuardado;
                cargarChatsDesdeCloud();
            } else {
                // Chat local temporal hasta login
                nuevoChat();
            }
            
            // Eventos
            const input = document.getElementById('inputUsuario');
            const btn = document.getElementById('enviarBtn');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    enviarMensaje();
                }
            });
            btn.addEventListener('click', enviarMensaje);
            
            mostrarToast('✨ Pivot AI con Cloud - Inicia sesión para guardar tus chats');
        }
        
        init();
    </script>
</body>
</html>
