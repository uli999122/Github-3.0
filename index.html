<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Nebula Ultra · Pivot Cloud Real</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at 10% 20%, #030712, #000000);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 2rem 1.5rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #ffffff20, rgba(0,0,0,0));
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #c084fc, #60a5fa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 0 15px rgba(96,165,250,0.3);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(5, 10, 25, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(96, 165, 250, 0.25);
            padding: 1.8rem;
            transition: all 0.3s ease;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }

        .card:hover {
            border-color: #60a5fa;
            transform: translateY(-5px);
            box-shadow: 0 25px 40px -12px #3b82f640;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 1px dashed #2d3a5e;
            padding-bottom: 0.6rem;
        }

        .upload-zone {
            border: 2px dashed #4b5563;
            border-radius: 1.5rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }

        .upload-zone:hover {
            border-color: #c084fc;
            background: rgba(192, 132, 252, 0.1);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }

        #fileInput {
            display: none;
        }

        .video-preview {
            margin-top: 1rem;
            text-align: center;
        }

        video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            box-shadow: 0 8px 20px black;
        }

        button {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 1rem;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            transition: width 0.3s;
        }

        .status {
            font-size: 0.8rem;
            padding: 0.5rem;
            border-radius: 1rem;
            background: #0f172a80;
            word-break: break-all;
        }

        .video-list {
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .video-item {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 1rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            display: flex;
            gap: 0.75rem;
            align-items: center;
            transition: 0.1s;
        }

        .video-thumb {
            width: 80px;
            height: 60px;
            background: #0f172a;
            border-radius: 8px;
            object-fit: cover;
        }

        .video-info {
            flex: 1;
            font-size: 0.75rem;
        }

        .video-name {
            font-weight: 700;
            margin-bottom: 0.25rem;
            word-break: break-word;
        }

        .delete-btn {
            background: #ef4444;
            padding: 0.3rem 0.9rem;
            font-size: 0.7rem;
            width: auto;
            margin-top: 0;
        }

        .agent-chat {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .agent-msg {
            background: #0f172a;
            border-radius: 1.2rem;
            padding: 0.9rem;
            border-left: 4px solid #c084fc;
            font-size: 0.9rem;
        }

        input {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 0.7rem;
            border-radius: 2rem;
            color: white;
            width: 100%;
        }

        .flex-btns {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
        }

        .small-btn {
            background: #1e2a4a;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            margin-top: 0;
            width: auto;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }
        .loading {
            text-align: center;
            padding: 1rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">🌌 NEBULA ULTRA</div>
        <div class="subtitle">Pivot Cloud · Almacenamiento real de videos en la nube</div>
    </div>

    <div class="dashboard">
        <!-- SUBIR VIDEO -->
        <div class="card">
            <div class="card-title">
                <span>⚡</span> Inyectar video
            </div>
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">🎥</div>
                <p>Toque para seleccionar archivo<br><small style="color:#94a3b8">MP4, MOV, webm · hasta 50MB</small></p>
                <input type="file" id="fileInput" accept="video/*">
            </div>
            <div id="previewContainer" class="video-preview"></div>
            <div class="progress-bar" id="progressBar" style="display: none;">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="uploadStatus" class="status"></div>
            <button id="uploadBtn" disabled>🚀 Subir a Nebula Ultra Cloud</button>
        </div>

        <!-- GALERÍA NEBULA -->
        <div class="card">
            <div class="card-title">
                <span>🌀</span> Nebula Drive · Archivos
            </div>
            <div id="videoListContainer" class="video-list">
                <div class="loading">Cargando constelación...</div>
            </div>
            <div class="flex-btns">
                <button id="refreshVideosBtn" class="small-btn" style="background:#2d3a5e;">🔄 Sincronizar</button>
                <button id="clearAllBtn" class="small-btn" style="background:#7f1a1a;">💀 Borrar todo</button>
            </div>
        </div>

        <!-- PIVOT AGENT + IA -->
        <div class="card">
            <div class="card-title">
                <span>🧠</span> Pivot Agent · Orion LLM
            </div>
            <div class="agent-chat">
                <div class="agent-msg" id="agentMessage">
                    🤖 <strong>Inicializando Pivot Agent...</strong>
                </div>
                <input type="text" id="agentInput" placeholder="Ej: estado, ayuda, limpiar cache...">
                <button id="askAgentBtn" style="background:#4c1d95;">✨ Consultar Agente</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // CONFIGURACIÓN REAL DE PIVOT CLOUD
    // --------------------------------------------------------------
    const PIVOT_API_BASE = "https://pivot-cloud.vercel.app/api";
    const APP_ID = "nebula-ultra";
    
    // Token maestro que obtendremos dinámicamente
    let MASTER_TOKEN = null;
    
    // Función para obtener el token maestro
    async function fetchMasterToken() {
        try {
            const response = await fetch(`${PIVOT_API_BASE}/token`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.success && data.token) {
                MASTER_TOKEN = data.token;
                console.log("✅ Token maestro obtenido");
                return true;
            }
            throw new Error("Token no recibido");
        } catch (error) {
            console.error("❌ Error obteniendo token:", error);
            return false;
        }
    }
    
    // Registrar la app Nebula Ultra en Pivot Cloud
    async function registerApp() {
        if (!MASTER_TOKEN) return false;
        try {
            const response = await fetch(`${PIVOT_API_BASE}/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    appId: APP_ID,
                    appToken: MASTER_TOKEN,
                    credentials: {
                        version: "1.0",
                        name: "Nebula Ultra",
                        description: "Almacenamiento de videos en la nube"
                    }
                })
            });
            const data = await response.json();
            console.log("Registro de app:", data);
            return data.success;
        } catch (error) {
            console.error("Error registrando app:", error);
            return false;
        }
    }
    
    // Guardar un log de acción
    async function logAction(action, details) {
        if (!MASTER_TOKEN) return;
        try {
            await fetch(`${PIVOT_API_BASE}/log`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    appId: APP_ID,
                    action: action,
                    details: details
                })
            });
        } catch (error) {
            console.warn("Error guardando log:", error);
        }
    }
    
    // Guardar un video como variable de entorno (almacenamiento real)
    async function saveVideoToCloud(videoId, videoName, videoDataURL) {
        if (!MASTER_TOKEN) throw new Error("Token no disponible");
        
        // Primero obtenemos las variables actuales
        const getResponse = await fetch(`${PIVOT_API_BASE}/env/${APP_ID}`, {
            headers: { "Authorization": `Bearer ${MASTER_TOKEN}` }
        });
        let currentVideos = {};
        if (getResponse.ok) {
            const data = await getResponse.json();
            if (data.success && data.data) {
                try {
                    currentVideos = JSON.parse(data.data.videos || "{}");
                } catch(e) { currentVideos = {}; }
            }
        }
        
        // Añadir nuevo video
        currentVideos[videoId] = {
            name: videoName,
            dataURL: videoDataURL,
            uploadedAt: new Date().toISOString(),
            size: videoDataURL.length
        };
        
        // Guardar actualizado
        const saveResponse = await fetch(`${PIVOT_API_BASE}/env/${APP_ID}`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${MASTER_TOKEN}`
            },
            body: JSON.stringify({
                key: "videos",
                value: JSON.stringify(currentVideos)
            })
        });
        
        const result = await saveResponse.json();
        if (!result.success) throw new Error("Error guardando en cloud");
        return result;
    }
    
    // Obtener todos los videos desde la nube
    async function fetchVideosFromCloud() {
        if (!MASTER_TOKEN) return [];
        try {
            const response = await fetch(`${PIVOT_API_BASE}/env/${APP_ID}`, {
                headers: { "Authorization": `Bearer ${MASTER_TOKEN}` }
            });
            if (!response.ok) return [];
            const data = await response.json();
            if (data.success && data.data && data.data.videos) {
                const videosObj = JSON.parse(data.data.videos);
                return Object.entries(videosObj).map(([id, info]) => ({ id, ...info }));
            }
            return [];
        } catch (error) {
            console.error("Error obteniendo videos:", error);
            return [];
        }
    }
    
    // Eliminar un video específico
    async function deleteVideoFromCloud(videoId) {
        if (!MASTER_TOKEN) return false;
        const videos = await fetchVideosFromCloud();
        const updatedVideos = {};
        videos.forEach(v => {
            if (v.id !== videoId) updatedVideos[v.id] = { name: v.name, dataURL: v.dataURL, uploadedAt: v.uploadedAt, size: v.size };
        });
        
        const response = await fetch(`${PIVOT_API_BASE}/env/${APP_ID}`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${MASTER_TOKEN}`
            },
            body: JSON.stringify({
                key: "videos",
                value: JSON.stringify(updatedVideos)
            })
        });
        const result = await response.json();
        return result.success;
    }
    
    // Eliminar todos los videos
    async function deleteAllVideosFromCloud() {
        if (!MASTER_TOKEN) return false;
        const response = await fetch(`${PIVOT_API_BASE}/env/${APP_ID}`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${MASTER_TOKEN}`
            },
            body: JSON.stringify({
                key: "videos",
                value: JSON.stringify({})
            })
        });
        const result = await response.json();
        return result.success;
    }
    
    // Renderizar galería desde la nube real
    async function renderVideoGallery() {
        const container = document.getElementById('videoListContainer');
        container.innerHTML = '<div class="loading">🌙 Cargando desde Pivot Cloud...</div>';
        
        const videos = await fetchVideosFromCloud();
        
        if (!videos.length) {
            container.innerHTML = '<div style="text-align:center; padding:1.5rem;">🌙 Vacío estelar · sube un video</div>';
            updateAgentStatus(videos.length);
            return;
        }
        
        container.innerHTML = '';
        videos.forEach(video => {
            const videoDiv = document.createElement('div');
            videoDiv.className = 'video-item';
            const thumbnail = document.createElement('video');
            thumbnail.className = 'video-thumb';
            thumbnail.muted = true;
            thumbnail.src = video.dataURL;
            thumbnail.onmouseenter = () => thumbnail.play();
            thumbnail.onmouseleave = () => thumbnail.pause();
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'video-info';
            const sizeMB = (video.dataURL.length * 0.75 / (1024 * 1024)).toFixed(2);
            infoDiv.innerHTML = `<div class="video-name">${escapeHtml(video.name)}</div>
                                 <div>${sizeMB} MB · ${new Date(video.uploadedAt).toLocaleString()}</div>`;
            
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑️';
            deleteBtn.className = 'delete-btn';
            deleteBtn.onclick = async (e) => {
                e.stopPropagation();
                if (confirm(`Eliminar ${video.name} del drive nebula?`)) {
                    await deleteVideoFromCloud(video.id);
                    await logAction("Video eliminado", `ID: ${video.id}, Nombre: ${video.name}`);
                    await renderVideoGallery();
                }
            };
            
            videoDiv.appendChild(thumbnail);
            videoDiv.appendChild(infoDiv);
            videoDiv.appendChild(deleteBtn);
            container.appendChild(videoDiv);
        });
        
        updateAgentStatus(videos.length);
        await logAction("Galería visualizada", `${videos.length} videos cargados`);
    }
    
    function escapeHtml(str) { 
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        });
    }
    
    async function updateAgentStatus(videoCount = null) {
        if (videoCount === null) {
            const videos = await fetchVideosFromCloud();
            videoCount = videos.length;
        }
        const agentMsgDiv = document.getElementById('agentMessage');
        agentMsgDiv.innerHTML = `🤖 <strong>Pivot Agent</strong> — IA Nebula Ultra<br>
        📡 Nodos activos: ${videoCount} archivos · Almacenamiento en Pivot Cloud<br>
        🧠 Comandos: "estado", "ayuda", "info"`;
    }
    
    // SUBIDA DE VIDEO REAL
    let selectedFile = null;
    const fileInput = document.getElementById('fileInput');
    const uploadZone = document.getElementById('uploadZone');
    const previewContainer = document.getElementById('previewContainer');
    const uploadBtn = document.getElementById('uploadBtn');
    const progressBarDiv = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const uploadStatus = document.getElementById('uploadStatus');
    
    uploadZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            selectedFile = e.target.files[0];
            if (selectedFile.size > 50 * 1024 * 1024) {
                uploadStatus.innerHTML = '❌ El video no puede superar 50MB';
                selectedFile = null;
                uploadBtn.disabled = true;
                return;
            }
            const videoURL = URL.createObjectURL(selectedFile);
            previewContainer.innerHTML = `<video src="${videoURL}" controls style="max-width:100%; max-height:180px"></video>`;
            uploadBtn.disabled = false;
            uploadStatus.innerHTML = '✅ Listo para subir a Pivot Cloud';
        } else {
            selectedFile = null;
            previewContainer.innerHTML = '';
            uploadBtn.disabled = true;
        }
    });
    
    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        uploadBtn.disabled = true;
        progressBarDiv.style.display = 'block';
        let progress = 0;
        const interval = setInterval(() => {
            progress += 10;
            if (progress >= 90) clearInterval(interval);
            progressFill.style.width = `${Math.min(progress,90)}%`;
        }, 150);
        uploadStatus.innerHTML = '⏫ Codificando video...';
        
        try {
            // Convertir video a Base64
            const reader = new FileReader();
            const dataURL = await new Promise((resolve, reject) => {
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(selectedFile);
            });
            
            progressFill.style.width = '70%';
            uploadStatus.innerHTML = '💾 Guardando en Pivot Cloud...';
            
            const videoId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            await saveVideoToCloud(videoId, selectedFile.name, dataURL);
            await logAction("Video subido", `Nombre: ${selectedFile.name}, Tamaño: ${(selectedFile.size/1024/1024).toFixed(2)}MB`);
            
            clearInterval(interval);
            progressFill.style.width = '100%';
            uploadStatus.innerHTML = `✨ Subida exitosa: ${selectedFile.name} guardado en Pivot Cloud`;
            setTimeout(() => {
                progressBarDiv.style.display = 'none';
                progressFill.style.width = '0%';
            }, 1500);
            
            selectedFile = null;
            fileInput.value = '';
            previewContainer.innerHTML = '';
            uploadBtn.disabled = true;
            await renderVideoGallery();
            
        } catch (err) {
            clearInterval(interval);
            uploadStatus.innerHTML = `❌ Error: ${err.message}`;
            uploadBtn.disabled = false;
            console.error(err);
        }
    });
    
    // Botones de control
    document.getElementById('clearAllBtn').addEventListener('click', async () => {
        if (confirm('⚠️ Eliminar TODOS los videos de Nebula Ultra? Esta acción es irreversible.')) {
            await deleteAllVideosFromCloud();
            await logAction("Todos los videos eliminados", "Borrado masivo");
            await renderVideoGallery();
            uploadStatus.innerHTML = '🧹 Todo el contenido fue purgado de Pivot Cloud.';
        }
    });
    
    document.getElementById('refreshVideosBtn').addEventListener('click', async () => {
        await renderVideoGallery();
    });
    
    // Agente interactivo
    document.getElementById('askAgentBtn').addEventListener('click', async () => {
        const input = document.getElementById('agentInput').value.toLowerCase();
        const agentMsgDiv = document.getElementById('agentMessage');
        const videos = await fetchVideosFromCloud();
        const videosCount = videos.length;
        
        let respuesta = '';
        if (input.includes('estado') || input.includes('status')) {
            respuesta = `📊 Estado del ecosistema Nebula: ${videosCount} videos alojados en Pivot Cloud. API conectada correctamente. Todo operativo.`;
        } else if (input.includes('limpiar') || input.includes('borrar todo')) {
            respuesta = '⚠️ Puedes usar el botón "Borrar todo" desde la interfaz. ¿Confirmas la acción?';
        } else if (input.includes('ayuda')) {
            respuesta = '💡 Comandos: "estado", "borrar todo", "qué es nebula", "versión", "info app".';
        } else if (input.includes('versión')) {
            respuesta = 'Nebula Ultra v2.0 · Integración real con Pivot Cloud API.';
        } else if (input.includes('info app')) {
            respuesta = `App ID: ${APP_ID} · Almacenamiento: variables de entorno en Pivot Cloud. Videos actuales: ${videosCount}.`;
        } else {
            respuesta = `🤖 Hola, soy el Agente Pivot. Actualmente hay ${videosCount} videos en el drive de Nebula Ultra. Pregunta "estado" o "ayuda".`;
        }
        agentMsgDiv.innerHTML = `🧠 <strong>Pivot Agent:</strong><br>${respuesta}`;
        document.getElementById('agentInput').value = '';
        await logAction("Consulta al agente", input);
    });
    
    // INICIALIZACIÓN: obtener token, registrar app y cargar videos
    (async function init() {
        const statusDiv = document.getElementById('uploadStatus');
        statusDiv.innerHTML = '🔌 Conectando con Pivot Cloud...';
        
        const tokenOk = await fetchMasterToken();
        if (!tokenOk) {
            statusDiv.innerHTML = '❌ No se pudo conectar a Pivot Cloud. ¿El servicio está activo?';
            return;
        }
        
        await registerApp();
        statusDiv.innerHTML = '✅ Conectado a Pivot Cloud';
        await renderVideoGallery();
    })();
</script>
</body>
</html>
